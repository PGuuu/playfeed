<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PlayFeed — 滑一下，玩一個</title>
<link rel="stylesheet" href="creator.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { height: 100%; background: #0b0b10; color: #f2f2f5; font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none; }
  /* 只有輸入框可以選字（留言、Email） */
  input, textarea { -webkit-user-select: text; user-select: text; }

  #feed { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }

  .post { position: relative; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always;
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100%; max-width: 560px; }
  /* touch-action:none：點擊/水平動作全給遊戲，絕不誤觸發捲動；
     上下滑改由 JS 偵測「明確的垂直滑動」才換遊戲（見 pointer 手勢處理） */
  canvas.game { width: 100%; height: 100%; display: block; touch-action: none; }

  .hud { position: absolute; top: max(14px, env(safe-area-inset-top)); left: 16px; right: 120px;
    display: flex; align-items: center; gap: 10px; pointer-events: none; }
  .chip { background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 999px;
    padding: 6px 14px; font-size: 14px; font-weight: 500; }
  .score-chip b { font-size: 18px; font-weight: 600; margin-left: 4px; }

  #authChip { position: fixed; top: max(14px, env(safe-area-inset-top)); right: 14px; z-index: 40;
    border: none; cursor: pointer; color: #fff; font-family: inherit;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 600; }
  #authChip.on { background: #4b46b8; }

  .rail { position: absolute; right: 10px; bottom: 110px; display: flex; flex-direction: column;
    gap: 14px; align-items: center; z-index: 5; transition: opacity 0.28s; }
  /* 遊戲進行中：淡出側邊鈕與左下資訊，並停用側邊鈕點擊（防誤觸） */
  .stage.playing .rail { opacity: 0; pointer-events: none; }
  .stage.playing .meta { opacity: 0; }
  .rail button { background: none; border: none; color: #fff; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; font-family: inherit; }
  .rail .ic { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.14);
    backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
    font-size: 21px; transition: transform 0.12s; }
  .rail button:active .ic { transform: scale(0.85); }
  .rail button.liked .ic { background: #43b968; }
  .rail button.disliked .ic { background: #d83e65; }
  .rail button.saved .ic { background: #d9a13b; }
  .rail button.rmx .ic { background: rgba(120,90,220,0.55); }
  /* 統一的線條圖示（取代原本的 emoji） */
  .ico { width: 1em; height: 1em; display: block; fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .rail button.liked .ico, .rail button.disliked .ico, .rail button.saved .ico { fill: currentColor; }
  .tico { display: inline-flex; vertical-align: -2px; font-size: 15px; margin-right: 5px; }

  .meta { position: absolute; left: 16px; right: 76px; bottom: calc(60px + env(safe-area-inset-bottom));
    z-index: 5; pointer-events: none; transition: opacity 0.28s; }
  .meta .author { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .meta .title { font-size: 14px; opacity: 0.9; }
  .meta .tip { font-size: 12px; opacity: 0.6; margin-top: 6px; }

  .overlay { position: absolute; inset: 0; z-index: 4; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; background: rgba(8,8,12,0.32);
    text-align: center; padding: 24px; }
  .overlay.hidden { display: none; }
  .overlay h2 { font-size: 26px; font-weight: 700; text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.8); }
  .overlay p { font-size: 15px; opacity: 0.95; line-height: 1.6; text-shadow: 0 1px 8px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.8); }
  .pv-tag { font-size: 12px; font-weight: 600; color: #7de08c; text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    display: flex; align-items: center; gap: 6px; }
  .pv-tag::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #7de08c;
    animation: pvblink 1.2s ease-in-out infinite; }
  @keyframes pvblink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .overlay .go { border: none; cursor: pointer; background: #fff; color: #111;
    font-family: inherit; font-size: 16px; font-weight: 600; padding: 12px 40px; border-radius: 999px; }
  .overlay .ov-btns { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
  .overlay .share-score { border: none; cursor: pointer; background: rgba(255,255,255,0.18);
    color: #fff; font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px 22px;
    border-radius: 999px; backdrop-filter: blur(6px); }
  .overlay .mechanic-create { border: 1px solid rgba(255,255,255,.4); cursor: pointer;
    background: rgba(0,0,0,.2); color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
    padding: 12px 22px; border-radius: 999px; backdrop-filter: blur(6px); }
  .overlay .final { font-size: 44px; font-weight: 700; }
  .overlay .newbest { color: #ffd75e; font-size: 14px; font-weight: 600; }

  .swipe-hint { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    font-size: 13px; opacity: 0.55; z-index: 4; pointer-events: none; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translate(-50%,0);} 50% { transform: translate(-50%,-8px);} }

  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.92); color: #111; font-size: 14px; font-weight: 500;
    padding: 10px 20px; border-radius: 999px; z-index: 90; opacity: 0; pointer-events: none;
    transition: opacity 0.25s; max-width: 86vw; text-align: center; }
  .toast.show { opacity: 1; }

  /* 留言面板 */
  #sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: #16161d; border-radius: 18px 18px 0 0; max-height: 68dvh;
    display: flex; flex-direction: column; transform: translateY(105%); transition: transform 0.25s; }
  #sheet.open { transform: translateY(0); }
  #sheet .head { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #sheet .head b { font-size: 15px; }
  #sheet .head button { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
  #cmtList { overflow-y: auto; padding: 8px 18px; flex: 1; min-height: 120px; }
  .cmt { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .cmt .who { font-size: 12px; color: #9a9ab0; margin-bottom: 3px; }
  .cmt .body { font-size: 14px; line-height: 1.5; }
  #cmtForm { display: flex; gap: 8px; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
  #cmtInput { flex: 1; background: #23232d; border: none; border-radius: 999px; color: #fff;
    font-family: inherit; font-size: 14px; padding: 11px 16px; outline: none; }
  #cmtSend { border: none; background: #4b46b8; color: #fff; font-family: inherit;
    font-weight: 600; font-size: 14px; border-radius: 999px; padding: 0 20px; cursor: pointer; }

  /* Remix 改造面板 */
  #remixSheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: #16161d; border-radius: 18px 18px 0 0; max-height: 60dvh;
    display: flex; flex-direction: column; transform: translateY(105%); transition: transform 0.25s; }
  #remixSheet.open { transform: translateY(0); }
  #remixSheet .head { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #remixSheet .head b { font-size: 15px; }
  #remixSheet .head button { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
  #remixSheet .note { font-size: 12px; color: #8a8aa0; padding: 10px 18px 4px; line-height: 1.6; }
  #remixChoice { display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 18px; }
  #remixSheet.choosing #remixChoice { display: grid; }
  #remixSheet.choosing #remixVersions,
  #remixSheet.choosing #remixNote,
  #remixSheet.choosing #remixSlots,
  #remixSheet.choosing #remixFoot { display: none; }
  .remix-choice {
    min-height: 128px; border: 1px solid rgba(255,255,255,.1); border-radius: 18px;
    background: #20202a; color: #fff; padding: 16px; text-align: left; cursor: pointer;
    font-family: inherit;
  }
  .remix-choice strong { display: block; font-size: 16px; }
  .remix-choice span { display: block; margin-top: 7px; color: #9b9bad; font-size: 12px; line-height: 1.55; }
  .remix-choice.mechanic { border-color: rgba(112,220,140,.32); background: rgba(112,220,140,.08); }
  .remix-choice.mechanic strong { color: #8bea9e; }
  @media (max-width: 380px) {
    #remixChoice { grid-template-columns: 1fr; }
    .remix-choice { min-height: 104px; }
  }
  #remixSlots { overflow-y: auto; padding: 4px 18px calc(16px + env(safe-area-inset-bottom)); }
  .slot { display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06); }
  .slot .preview { width: 58px; height: 58px; border-radius: 12px; flex: none; overflow: hidden;
    display: flex; align-items: center; justify-content: center; font-size: 34px;
    background-color: #2a2a34;
    background-image: linear-gradient(45deg,#3a3a44 25%,transparent 25%),linear-gradient(-45deg,#3a3a44 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#3a3a44 75%),linear-gradient(-45deg,transparent 75%,#3a3a44 75%);
    background-size: 14px 14px; background-position: 0 0,0 7px,7px -7px,-7px 0; }
  .slot .preview img { width: 100%; height: 100%; object-fit: contain; }
  .slot .info { flex: 1; min-width: 0; }
  .slot .info .l { font-size: 14px; font-weight: 600; }
  .slot .info .h { font-size: 12px; color: #9a9ab0; margin-top: 2px; }
  .slot .acts { display: flex; flex-direction: column; gap: 6px; flex: none; }
  .slot .up { border: none; background: #6a5ad0; color: #fff; font-family: inherit; font-size: 13px;
    font-weight: 600; border-radius: 999px; padding: 8px 16px; cursor: pointer; white-space: nowrap; }
  .slot .rst { border: none; background: none; color: #8a8aa0; font-family: inherit; font-size: 12px;
    cursor: pointer; }
  .slot .rst[disabled] { opacity: 0.35; cursor: default; }
  #remixFoot { display: flex; gap: 8px; padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255,255,255,0.08); }
  #remixName { flex: 1; min-width: 0; background: #23232d; border: none; border-radius: 999px; color: #fff;
    font-family: inherit; font-size: 14px; padding: 11px 16px; outline: none; }
  #remixSave { border: none; background: #6a5ad0; color: #fff; font-family: inherit; font-weight: 600;
    font-size: 14px; border-radius: 999px; padding: 0 18px; cursor: pointer; white-space: nowrap; }
  #remixSave:disabled { opacity: 0.6; cursor: default; }
  /* 這個遊戲已有的改造版（橫向捲動的縮圖） */
  #remixVersions { display: flex; gap: 8px; overflow-x: auto; padding: 10px 18px 2px; scrollbar-width: none; }
  #remixVersions::-webkit-scrollbar { display: none; }
  #remixVersions:empty { display: none; }
  .verchip { flex: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; width: 62px; }
  .verchip .sw { width: 54px; height: 54px; border-radius: 12px; flex: none; }
  .verchip .nm { font-size: 11px; color: #bcbcd0; max-width: 62px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; text-align: center; }
  .verchip.cur .sw { outline: 2px solid #6a5ad0; outline-offset: 1px; }
  .vhead { font-size: 12px; color: #9a9ab0; padding: 12px 18px 0; }

  /* 登入視窗（Phuze magic link） */
  #login { position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; padding: 24px; }
  #login.open { display: flex; }
  #login .box { background: #1a1a22; border-radius: 18px; padding: 26px 22px; width: 100%;
    max-width: 340px; display: flex; flex-direction: column; gap: 14px; text-align: center; }
  #login h3 { font-size: 19px; }
  #login p { font-size: 13px; color: #a5a5ba; line-height: 1.6; }
  #phuze-widget { min-height: 52px; text-align: left; }
  #login .ghost { background: none; border: none; color: #8f8fa5; font-size: 13px;
    font-family: inherit; cursor: pointer; padding: 6px; }
  .backdrop { position: fixed; inset: 0; z-index: 55; display: none; }
  .backdrop.open { display: block; }

  /* 個人頁（IG 風格全螢幕 + 分頁 + 縮圖網格 + 底部導覽） */
  #profile { position: fixed; inset: 0; z-index: 65; background: #0b0b10;
    display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s; }
  #profile.open { transform: translateY(0); }
  .phead { display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 12px; }
  .phead b { font-size: 17px; font-weight: 700; }
  .phead button { background: rgba(255,255,255,0.1); border: none; color: #ccc;
    font-family: inherit; font-size: 12px; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
  .ptabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .ptabs button { flex: 1; background: none; border: none; color: #8a8aa0; font-family: inherit;
    font-size: 13px; font-weight: 600; padding: 12px 0; cursor: pointer; border-bottom: 2px solid transparent; }
  .ptabs button.active { color: #fff; border-bottom-color: #fff; }
  #pgrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 3px; padding: 3px; align-content: start; }
  #pgrid .gempty { grid-column: 1 / -1; text-align: center; color: #77778c;
    font-size: 13px; padding: 48px 24px; line-height: 1.8; }
  .gcell { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .gcell .hero { font-size: 46px; line-height: 1; }
  .gcell .hero img { width: 60%; height: 60%; object-fit: contain; }
  .gcell .cap { position: absolute; left: 0; right: 0; bottom: 0; padding: 16px 7px 5px;
    background: linear-gradient(0deg, rgba(0,0,0,0.75), transparent);
    font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gcell .badge { position: absolute; top: 5px; left: 5px; font-size: 10px; font-weight: 700;
    background: rgba(106,90,208,0.9); color: #fff; padding: 2px 7px; border-radius: 999px; }
  @media (max-width: 520px) {
    .ptabs button { font-size: 11px; }
    .ptabs .tico { margin-right: 2px; font-size: 13px; }
  }

  /* 底部常駐導覽（IG 風格）：首頁／我的，兩個畫面都固定看得到 */
  #mainNav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 66; display: flex;
    background: rgba(10,10,14,0.68); backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08); padding-bottom: env(safe-area-inset-bottom);
    transition: transform 0.22s, opacity 0.22s; }
  #mainNav.hide { transform: translateY(100%); opacity: 0; pointer-events: none; }
  #mainNav button { flex: 1; background: none; border: none; color: #8a8aa0; font-family: inherit;
    font-size: 11px; cursor: pointer; padding: 9px 0 7px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  #mainNav button .ni { font-size: 21px; line-height: 1; }
  #mainNav button.active { color: #fff; }

  /* 單一遊戲視圖：從個人頁／版本列表／分享連結進來的改造版，不混進首頁 */
  #remixView { position: fixed; inset: 0; z-index: 67; background: #0b0b10;
    display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s; }
  #remixView.open { transform: translateY(0); }
  #remixViewStage { flex: 1; position: relative; overflow: hidden; }
  #remixViewBack { position: absolute; top: max(14px, env(safe-area-inset-top)); left: 14px; z-index: 10;
    border: none; cursor: pointer; color: #fff; font-family: inherit;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>

<button id="authChip">登入</button>
<div id="feed"></div>
<div class="toast" id="toast"></div>

<div class="backdrop" id="backdrop"></div>
<div id="sheet">
  <div class="head"><b id="sheetTitle">留言</b><button id="sheetClose">&#10005;</button></div>
  <div id="cmtList"></div>
  <div id="cmtForm">
    <input id="cmtInput" maxlength="300" placeholder="留下你的 feedback…">
    <button id="cmtSend">送出</button>
  </div>
</div>

<div id="profile">
  <div class="phead"><b id="profileWho">個人頁</b><button id="logoutBtn">登出</button></div>
  <div class="ptabs">
    <button class="active" data-tab="created"><span class="tico" data-ico="create"></span>自創</button>
    <button data-tab="remixed"><span class="tico" data-ico="remix"></span>改造</button>
    <button data-tab="saved"><span class="tico" data-ico="save"></span>儲存</button>
    <button data-tab="liked"><span class="tico" data-ico="like"></span>按讚</button>
    <button data-tab="disliked"><span class="tico" data-ico="dislike"></span>倒讚</button>
  </div>
  <div id="pgrid"></div>
</div>

<div id="mainNav">
  <button id="navHomeMain" class="active"><span class="ni" data-ico="home"></span>首頁</button>
  <button id="navCreateMain"><span class="ni" data-ico="create"></span>創作</button>
  <button id="navMeMain"><span class="ni" data-ico="user"></span>個人</button>
</div>

<div id="remixView">
  <button id="remixViewBack">&#8249; 返回</button>
  <div id="remixViewStage"></div>
</div>

<div id="remixSheet">
  <div class="head"><b id="remixTitle">改造這個遊戲</b><button id="remixClose">&#10005;</button></div>
  <div id="remixChoice">
    <button class="remix-choice image" id="chooseImageRemix"><strong>換圖片改造</strong><span>玩法不變，替換角色或物件的外觀。</span></button>
    <button class="remix-choice mechanic" id="chooseMechanicRemix"><strong>用這個玩法創作</strong><span>保留核心機制，交給自己的 AI 製作不同主題。</span></button>
  </div>
  <div id="remixVersions"></div>
  <div class="note" id="remixNote">上傳圖片替換遊戲元素（支援透明圖檔）。圖片會置中縮放、對齊虛線輪廓，並即時顯示在上面的畫面。儲存後會變成大家都能玩的新遊戲（需登入）。</div>
  <div id="remixSlots"></div>
  <div id="remixFoot">
    <input id="remixName" maxlength="40" placeholder="幫你的新版本取個名字">
    <button id="remixSave">儲存成新遊戲</button>
  </div>
  <input type="file" id="remixFile" accept="image/*" style="display:none">
</div>

<div id="login">
  <div class="box">
    <h3>登入 PlayFeed</h3>
    <p>輸入 Email，點信裡的連結就完成登入。<br>登入後就能按讚、留言、把遊戲收進「我的頁面」。</p>
    <div id="phuze-widget"></div>
    <button class="ghost" id="skipLogin">先不用，我玩玩就好</button>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://phuze.edato.me/phuze.js"></script>

<script>
/* ---------- 全域：畫布尺寸與音效（遊戲包會用到） ---------- */
const W = 400, H = 700;
let AC = null;
function ensureAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}
function beep(f1, f2, dur, vol, type) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f1, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
</script>

<script>
/* ---------- 後台連線（沒設定 config.js 也能跑，會進入體驗模式） ---------- */
const cfg = window.PLAYFEED_CONFIG || {};
const online = !!(cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && window.supabase);
const db = online ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY) : null;
const phuzeOn = !!(cfg.PHUZE_PUBLISHABLE_KEY && window.Phuze);
let user = null;
let phuzeToken = '';
let pendingAction = null;   // 被登入擋下的動作，登入成功後自動補做
const DISLIKE_PREFIX = '__dislike__:';
const likeState = {};   // game_id -> { count, mine, dislikeCount, disliked }
const saveState = {};   // game_id -> mine
const bests = {};

/* ---------- 統一的線條圖示（inline SVG，取代原本各處的 emoji） ---------- */
const ICONS = {
  like:    '<svg class="ico" viewBox="0 0 24 24"><path d="M7 10v11H3V10h4Z"/><path d="M7 19h10.2a2 2 0 0 0 1.9-1.4l1.7-6A2 2 0 0 0 18.9 9H14l.7-3.2A2.3 2.3 0 0 0 12.5 3L7 10v9Z"/></svg>',
  dislike: '<svg class="ico" viewBox="0 0 24 24"><path d="M17 14V3h4v11h-4Z"/><path d="M17 5H6.8a2 2 0 0 0-1.9 1.4l-1.7 6A2 2 0 0 0 5.1 15H10l-.7 3.2a2.3 2.3 0 0 0 2.2 2.8L17 14V5Z"/></svg>',
  comment: '<svg class="ico" viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.4L3 21l2.1-5.4A8.5 8.5 0 1 1 21 11.5Z"/></svg>',
  save:    '<svg class="ico" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
  remix:   '<svg class="ico" viewBox="0 0 24 24"><path d="M4.5 19.5 14.5 9.5"/><path d="M18 2.5l1 2.6 2.6 1-2.6 1-1 2.6-1-2.6-2.6-1 2.6-1z" fill="currentColor" stroke="none"/></svg>',
  share:   '<svg class="ico" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>',
  home:    '<svg class="ico" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 8.5V21h14V8.5"/><path d="M9.5 21v-6h5v6"/></svg>',
  user:    '<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>',
  create:  '<svg class="ico" viewBox="0 0 24 24"><path d="M12 3l1.9 4.8 4.8 1.9-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9z"/><path d="M19 15l.6 1.7 1.7.6-1.7.6-.6 1.7-.6-1.7-1.7-.6 1.7-.6z" fill="currentColor" stroke="none"/></svg>'
};
function injectIcons(root) { (root || document).querySelectorAll('[data-ico]').forEach(el => { el.innerHTML = ICONS[el.dataset.ico] || ''; }); }
injectIcons();   /* 填入靜態元素（底部導覽、個人頁分頁） */

const authChip = document.getElementById('authChip');
function displayName(u) {
  const e = (u && u.email) || '';
  return e ? e.split('@')[0].slice(0, 12) : '玩家';
}
function setUser(u) {
  user = u;
  authChip.textContent = u ? displayName(u) : '登入';
  authChip.classList.toggle('on', !!u);
}
function currentPhuzeToken(session) {
  return String(
    session?.token ||
    session?.sessionToken ||
    session?.accessToken ||
    localStorage.getItem('phuze_session') ||
    ''
  );
}
async function secureWrite(action, payload = {}) {
  if (!phuzeToken) throw new Error('登入已失效，請重新登入');
  const response = await fetch('/api/write', {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${phuzeToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ action, ...payload })
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.ok) {
    if (response.status === 401) {
      phuzeToken = '';
      setUser(null);
    }
    throw new Error(result.error || '操作失敗，請稍後再試');
  }
  return result;
}

/* ---------- 登入（Phuze magic link） ---------- */
const loginBox = document.getElementById('login');
function openLogin() { loginBox.classList.add('open'); setNavVisible(false); }
function closeLogin() { loginBox.classList.remove('open'); restoreNavVisibility(); }
document.getElementById('skipLogin').addEventListener('click', () => { pendingAction = null; closeLogin(); });
authChip.addEventListener('click', () => {
  if (user) return openProfile();
  if (!phuzeOn) return toast('尚未連接會員系統，先設定 config.js（見開始指南）');
  openLogin();
});
if (phuzeOn) {
  Phuze.init({
    publishableKey: cfg.PHUZE_PUBLISHABLE_KEY,
    locale: 'zh-TW',
    text: {
      button: '寄登入連結給我', buttonLoading: '寄送中…', buttonSignOut: '登出',
      placeholder: 'name@example.com',
      sentTitle: '去收信！', sentSubtitle: '點信裡的連結，這個畫面會自動完成登入。'
    },
    theme: { accentColor: '#4b46b8', accentHoverColor: '#5a54d6', accentTextColor: '#ffffff',
             borderRadius: '12px', borderColor: '#33334a' }
  });
  Phuze.mount('#phuze-widget');
  Phuze.onSessionChange(session => {
    const wasIn = !!user;
    phuzeToken = session ? currentPhuzeToken(session) : '';
    setUser(session ? { id: session.uid, email: session.email || '' } : null);
    loadLikes(); loadSaves();
    if (window.PlayFeedCreator) window.PlayFeedCreator.refreshInteractions();
    if (session && !wasIn) {
      if (loginBox.classList.contains('open')) { closeLogin(); toast('登入成功！'); }
      if (pendingAction) { const fn = pendingAction; pendingAction = null; fn(); }
    }
    if (!session) pendingAction = null;
  });
}
function requireLogin(action) {
  if (!online || !phuzeOn) { toast('體驗模式：尚未連接後台，互動先不會被儲存'); return false; }
  if (!user) { pendingAction = action || null; openLogin(); return false; }
  return true;
}

/* ---------- 底部常駐導覽（IG 風格：首頁 / 我的） ---------- */
const mainNav = document.getElementById('mainNav');
function setNavVisible(v) { mainNav.classList.toggle('hide', !v); }
/* 關掉某個蓋在上面的面板（留言/登入/改造）後，導覽列該不該出現要看底下是首頁還是單一遊戲視圖 */
function restoreNavVisibility() { setNavVisible(!document.getElementById('remixView').classList.contains('open')); }
function setMainNavActive(tab) {
  document.getElementById('navHomeMain').classList.toggle('active', tab === 'home');
  document.getElementById('navCreateMain').classList.toggle('active', tab === 'create');
  document.getElementById('navMeMain').classList.toggle('active', tab === 'me');
}
document.getElementById('navHomeMain').addEventListener('click', () => {
  if (window.PlayFeedCreator) window.PlayFeedCreator.close();
  closeProfile(); closeStandalone();
});
document.getElementById('navCreateMain').addEventListener('click', () => {
  closeProfile(); closeStandalone();
  if (window.PlayFeedCreator) window.PlayFeedCreator.open();
  else toast('創作工具載入中，請再按一次');
});
document.getElementById('navMeMain').addEventListener('click', () => {
  if (window.PlayFeedCreator) window.PlayFeedCreator.close();
  if (user) return openProfile();
  if (!phuzeOn) return toast('尚未連接會員系統，先設定 config.js（見開始指南）');
  pendingAction = () => openProfile();
  openLogin();
});

/* ---------- 個人頁面（IG 風格：分頁 + 縮圖網格） ---------- */
const profileBox = document.getElementById('profile');
let profileTab = 'created';
function openProfile() {
  closeStandalone();
  document.getElementById('profileWho').textContent = user ? displayName(user) : '個人頁';
  renderProfileGrid(profileTab);
  profileBox.classList.add('open');
  setMainNavActive('me');
}
function closeProfile() { profileBox.classList.remove('open'); setMainNavActive('home'); }
document.querySelectorAll('.ptabs button').forEach(b => b.addEventListener('click', () => {
  profileTab = b.dataset.tab;
  document.querySelectorAll('.ptabs button').forEach(x => x.classList.toggle('active', x === b));
  renderProfileGrid(profileTab);
}));
document.getElementById('logoutBtn').addEventListener('click', async () => {
  closeProfile();
  if (phuzeOn) await Phuze.logout();
  toast('已登出');
});
function profileData(tab) {
  if (tab === 'created') {
    return user && window.PlayFeedCreator ? window.PlayFeedCreator.profileEntries(user.id) : [];
  }
  if (tab === 'remixed') {
    return user ? remixRows.filter(r => r.user_id === user.id).map(cacheRemixEntry).filter(Boolean) : [];
  }
  const st = tab === 'saved' ? saveState : likeState;
  return Object.keys(st)
    .filter(id => tab === 'saved' ? st[id] :
      (tab === 'disliked' ? st[id]?.disliked : st[id]?.mine))
    .map(entryFor).filter(Boolean);
}
function renderProfileGrid(tab) {
  const grid = document.getElementById('pgrid');
  const items = profileData(tab);
  grid.innerHTML = '';
  if (!items.length) {
    const msg = { created: '還沒有自創遊戲。到「創作」貼上 Script，就能發布第一款。',
      remixed: '還沒有改造遊戲。從 Feed 選一款支援改造的遊戲開始。',
      saved: '還沒有收藏。看到喜歡的遊戲按「儲存」。',
      liked: '還沒有按讚的遊戲。', disliked: '還沒有倒讚的遊戲。' }[tab];
    const empty = document.createElement('div');
    empty.className = 'gempty'; empty.textContent = msg; grid.appendChild(empty);
    return;
  }
  for (const e of items) {
    const cell = document.createElement('div');
    cell.className = 'gcell';
    cell.style.background = e.bg;
    const firstSprite = e.spriteData && Object.values(e.spriteData)[0];
    const hero = document.createElement('span');
    hero.className = 'hero';
    if (e.screenshot || firstSprite) {
      const image = document.createElement('img'); image.src = e.screenshot || firstSprite; hero.appendChild(image);
    } else {
      hero.textContent = e.remixSlots && e.remixSlots[0] ? e.remixSlots[0].default : '🎮';
    }
    cell.appendChild(hero);
    if (e.remixOf || e.userScript) {
      const badge = document.createElement('span'); badge.className = 'badge';
      badge.textContent = e.userScript ? 'Script' : '改造'; cell.appendChild(badge);
    }
    const cap = document.createElement('span'); cap.className = 'cap';
    cap.textContent = e.title.split('：')[0]; cell.appendChild(cap);
    cell.addEventListener('click', () => {
      closeProfile();
      if (e.userScript) {
        const target = document.querySelector('.sandbox-post[data-game-id="' + CSS.escape(e.id) + '"]');
        if (target) setTimeout(() => target.scrollIntoView(), 60);
        return;
      }
      if (e.remixOf) { openStandalone(e.id); return; }
      const t = posts.find(x => x.id === e.id);
      if (t) setTimeout(() => t.el.scrollIntoView(), 60);
    });
    grid.appendChild(cell);
  }
}

/* ---------- 按讚 ---------- */
function emptyReaction() {
  return { count: 0, mine: false, dislikeCount: 0, disliked: false };
}
function reactionState(gameId) {
  return likeState[gameId] || (likeState[gameId] = emptyReaction());
}
function reactionDbKey(gameId, reaction) {
  return reaction === 'dislike' ? DISLIKE_PREFIX + gameId : gameId;
}
async function loadLikes() {
  if (!online) return;
  const { data, error } = await db.from('likes').select('game_id,user_id');
  if (error || !data) return;
  for (const key of Object.keys(likeState)) delete likeState[key];
  for (const p of posts) likeState[p.id] = emptyReaction();
  for (const row of data) {
    const isDislike = row.game_id.startsWith(DISLIKE_PREFIX);
    const gameId = isDislike ? row.game_id.slice(DISLIKE_PREFIX.length) : row.game_id;
    const st = reactionState(gameId);
    if (isDislike) {
      st.dislikeCount++;
      if (user && row.user_id === user.id) st.disliked = true;
    } else {
      st.count++;
      if (user && row.user_id === user.id) st.mine = true;
    }
  }
  for (const p of posts) p.refreshLike();
}
function refreshPost(gameId) {
  const p = posts.find(p => p.id === gameId) || (standalonePost && standalonePost.id === gameId ? standalonePost : null);
  if (p) { p.refreshLike(); p.refreshSave(); }
}
async function toggleReaction(gameId, reaction) {
  if (!requireLogin(() => toggleReaction(gameId, reaction))) return;
  const st = reactionState(gameId);
  const previous = { ...st };
  const isLike = reaction === 'like';
  const active = isLike ? st.mine : st.disliked;
  let nextReaction = null;

  if (active) {
    if (isLike) { st.mine = false; st.count = Math.max(0, st.count - 1); }
    else { st.disliked = false; st.dislikeCount = Math.max(0, st.dislikeCount - 1); }
  } else {
    if (isLike) {
      if (st.disliked) {
        st.disliked = false;
        st.dislikeCount = Math.max(0, st.dislikeCount - 1);
      }
      st.mine = true; st.count++;
    } else {
      if (st.mine) {
        st.mine = false;
        st.count = Math.max(0, st.count - 1);
      }
      st.disliked = true; st.dislikeCount++;
    }
    nextReaction = reaction;
  }
  refreshPost(gameId);
  try {
    await secureWrite('reaction', { gameId, reaction: nextReaction });
  } catch (error) {
    Object.assign(st, previous);
    refreshPost(gameId);
    toast('操作失敗：' + error.message);
    return;
  }
  if (window.PlayFeedCreator) window.PlayFeedCreator.refreshInteractions();
  if (profileBox.classList.contains('open')) renderProfileGrid(profileTab);
}

/* ---------- 儲存（收藏到我的頁面） ---------- */
async function loadSaves() {
  for (const p of posts) saveState[p.id] = false;
  if (online && user) {
    const { data } = await db.from('saves').select('game_id').eq('user_id', user.id);
    if (data) for (const row of data) saveState[row.game_id] = true;
  }
  for (const p of posts) p.refreshSave();
}
async function toggleSave(gameId) {
  if (!requireLogin(() => toggleSave(gameId))) return;
  const on = !saveState[gameId];
  saveState[gameId] = on;
  refreshPost(gameId);
  try {
    await secureWrite('save', { gameId, active: on });
    if (on) toast('已收藏到我的頁面 🔖');
  } catch (error) {
    saveState[gameId] = !on;
    refreshPost(gameId);
    toast('操作失敗：' + error.message);
    return;
  }
  if (window.PlayFeedCreator) window.PlayFeedCreator.refreshInteractions();
}

/* ---------- 留言 ---------- */
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');
const cmtList = document.getElementById('cmtList');
let sheetGame = null;
function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('open'); restoreNavVisibility(); }
document.getElementById('sheetClose').addEventListener('click', closeSheet);
backdrop.addEventListener('click', () => { closeSheet(); closeProfile(); closeRemix(); });
async function openComments(g) {
  sheetGame = g;
  document.getElementById('sheetTitle').textContent = g.title.split('：')[0] + ' 的留言';
  cmtList.innerHTML = '<div class="cmt"><div class="body" style="color:#8f8fa5">載入中…</div></div>';
  sheet.classList.add('open'); backdrop.classList.add('open'); setNavVisible(false);
  if (!online) {
    cmtList.innerHTML = '<div class="cmt"><div class="body" style="color:#8f8fa5">尚未連接後台，設定 config.js 之後留言就會是真的。</div></div>';
    return;
  }
  const { data, error } = await db.from('comments')
    .select('name,body,created_at').eq('game_id', g.id)
    .order('created_at', { ascending: false }).limit(50);
  if (error) { cmtList.innerHTML = '<div class="cmt"><div class="body">載入失敗，稍後再試</div></div>'; return; }
  renderComments(data);
}
function renderComments(rows) {
  if (!rows.length) {
    cmtList.innerHTML = '<div class="cmt"><div class="body" style="color:#8f8fa5">還沒有留言，搶頭香吧。</div></div>';
    return;
  }
  cmtList.innerHTML = rows.map(r => {
    const d = new Date(r.created_at);
    const when = (d.getMonth()+1) + '/' + d.getDate() + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="cmt"><div class="who">${esc(r.name)} · ${when}</div><div class="body">${esc(r.body)}</div></div>`;
  }).join('');
}
async function sendComment() {
  const input = document.getElementById('cmtInput');
  const body = input.value.trim();
  if (!body || !sheetGame) return;
  if (!requireLogin(sendComment)) return;
  try {
    await secureWrite('comment', { gameId: sheetGame.id, body });
  } catch (error) {
    return toast('送出失敗：' + error.message);
  }
  input.value = '';
  openComments(sheetGame);
}
document.getElementById('cmtSend').addEventListener('click', sendComment);

/* ---------- 分享 ---------- */
async function shareGame(g) {
  const url = location.origin + location.pathname + '#' + g.id;
  if (navigator.share) {
    try { await navigator.share({ title: 'PlayFeed', text: '來挑戰「' + g.title + '」！', url }); } catch (e) {}
  } else {
    try { await navigator.clipboard.writeText(url); toast('連結已複製，貼給朋友挑戰吧'); }
    catch (e) { toast(url); }
  }
}

/* ---------- 分數上傳 ---------- */
async function submitScore(gameId, score) {
  if (!online || !user || !score) return;
  try { await secureWrite('score', { gameId, score }); } catch (error) {}
}

/* ---------- 分享成績（含截圖卡片） ---------- */
function buildShareCard(snapURL, title, score, cb) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    const cx = c.getContext('2d');
    cx.drawImage(img, 0, 0, W, H);           /* 精華截圖：結算那一刻的畫面 */
    /* 頂部徽章 */
    const tg = cx.createLinearGradient(0, 0, 0, 120);
    tg.addColorStop(0, 'rgba(0,0,0,0.55)'); tg.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = tg; cx.fillRect(0, 0, W, 120);
    cx.textAlign = 'left'; cx.fillStyle = '#fff'; cx.font = '800 20px system-ui';
    cx.fillText('🎮 PlayFeed', 20, 42);
    /* 底部：遊戲名 + 大分數 */
    const grd = cx.createLinearGradient(0, H - 260, 0, H);
    grd.addColorStop(0, 'rgba(0,0,0,0)'); grd.addColorStop(1, 'rgba(0,0,0,0.88)');
    cx.fillStyle = grd; cx.fillRect(0, H - 260, W, 260);
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.9)'; cx.font = '700 26px system-ui';
    cx.fillText(title.split('：')[0], W / 2, H - 108);
    cx.fillStyle = '#ffd75e'; cx.font = '900 60px system-ui';
    cx.fillText(score + '', W / 2, H - 50);
    cx.fillStyle = 'rgba(255,255,255,0.85)'; cx.font = '600 15px system-ui';
    cx.fillText('分 · 換你來破紀錄', W / 2, H - 24);
    cb(c.toDataURL('image/png'));
  };
  img.onerror = () => cb(null);
  img.src = snapURL;
}
async function shareScoreCard(cardURL, g, score) {
  const url = location.origin + location.pathname + '#' + g.id;
  const text = '我在 PlayFeed 玩《' + g.title.split('：')[0] + '》拿了 ' + score + ' 分！來挑戰 👉';
  let file = null;
  try {
    const blob = await (await fetch(cardURL)).blob();
    file = new File([blob], 'playfeed-score.png', { type: 'image/png' });
  } catch (e) {}
  /* 1. 首選：原生分享「帶精華圖」 */
  if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], text, url }); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  /* 2. 不支援帶圖分享：下載精華圖（確保圖一定到手）+ 複製文字連結 */
  const a = document.createElement('a'); a.href = cardURL; a.download = 'playfeed-score.png'; a.click();
  let copied = false;
  try { await navigator.clipboard.writeText(text + ' ' + url); copied = true; } catch (e) {}
  if (navigator.share) { try { await navigator.share({ text, url }); return; } catch (e) { if (e.name === 'AbortError') return; } }
  toast(copied ? '精華圖已下載，文字連結也複製好了' : '精華圖已下載');
}

/* ---------- Remix：上傳圖片替換元素 → 發佈成新遊戲（存後端 remixes 表） ---------- */
function imgFrom(dataURL) { const im = new Image(); im.src = dataURL; return im; }
function spritesFromData(data) { const out = {}; for (const k in (data || {})) out[k] = imgFrom(data[k]); return out; }
/* Remix 資料快取：remixRows 是後端原始資料，entry 是要餵給 makePost/UI 的整理過格式。
   刻意跟「首頁 feed 裡有哪些 post」脫鉤——remix 不會自動混進首頁，只在被明確點開時才建立畫面。 */
let remixRows = [];
const remixEntryCache = {};
function cacheRemixEntry(row) {
  const id = 'remix:' + row.id;
  if (!remixEntryCache[id]) {
    const entry = toRemixEntry(row);
    if (!entry) return null;
    remixEntryCache[id] = entry;
  }
  return remixEntryCache[id];
}
function baseEntryById(id) { const g = (window.GAMES || []).find(g => g.id === id); return g ? toBaseEntry(g) : null; }
function entryFor(id) {
  if (id.indexOf('game:') === 0 && window.PlayFeedCreator) {
    return window.PlayFeedCreator.entryFor(id);
  }
  if (id.indexOf('remix:') === 0) {
    if (remixEntryCache[id]) return remixEntryCache[id];
    const row = remixRows.find(r => 'remix:' + r.id === id);
    return row ? cacheRemixEntry(row) : null;
  }
  return baseEntryById(id);
}
function mechanicTemplateFor(entry) {

/* 槽位預覽：畫出元素的輪廓＋你上傳的圖，讓你知道圖會怎麼縮放對齊 */
function drawSlotPreview(cvs, slot, cur) {
  const S = 58, pad = 7, ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, S, S);
  const shape = slot.shape || 'free';
  let bw = S - 2 * pad, bh = S - 2 * pad;
  if (shape === 'wide') bh = 32;
  else if (shape === 'tall') bw = 34;
  const bx = (S - bw) / 2, by = (S - bh) / 2;
  const shapePath = () => {
    ctx.beginPath();
    if (shape === 'circle') ctx.arc(S / 2, S / 2, Math.min(bw, bh) / 2, 0, 6.283);
    else ctx.roundRect(bx, by, bw, bh, 6);
  };
  const im = cur && cur.img;
  if (im && im.complete && im.naturalWidth) {
    const sc = Math.min(bw / im.width, bh / im.height), w = im.width * sc, h = im.height * sc;
    ctx.drawImage(im, (S - w) / 2, (S - h) / 2, w, h);
  } else {
    ctx.globalAlpha = 0.5; ctx.font = Math.min(bw, bh) * 0.78 + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(slot.default, S / 2, S / 2 + 2); ctx.globalAlpha = 1;
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
  shapePath(); ctx.stroke(); ctx.setLineDash([]);
}

/* ---------- Feed 引擎 ---------- */
const feed = document.getElementById('feed');
const posts = [];

/* 一個 entry = 基本遊戲 或 已發佈的 remix。都用 entry.base.create() 跑，靠 getSprite 換皮。 */
function makePost(entry, opts) {
  opts = opts || {};
  const post = document.createElement('section');
  post.className = 'post';
  post.style.background = entry.bg;
  post.innerHTML = `
    <div class="stage">
      <canvas class="game" width="${W}" height="${H}"></canvas>
      <div class="hud">
        <span class="chip score-chip">分數<b class="sc">0</b></span>
        <span class="chip best-chip" style="display:none">最佳 <span class="bs">0</span></span>
      </div>
      <div class="rail">
        <button class="like" aria-label="按讚"><span class="ic">${ICONS.like}</span><span class="lc">0</span></button>
        <button class="dislike" aria-label="倒讚"><span class="ic">${ICONS.dislike}</span><span class="dc">0</span></button>
        <button class="cmt"><span class="ic">${ICONS.comment}</span><span>留言</span></button>
        <button class="sv"><span class="ic">${ICONS.save}</span><span>儲存</span></button>
        ${entry.remixSlots ? '<button class="rmx"><span class="ic">' + ICONS.remix + '</span><span>改造</span></button>' : ''}
        <button class="shr"><span class="ic">${ICONS.share}</span><span>分享</span></button>
      </div>
      <div class="meta">
        <div class="author">${entry.author}</div>
        <div class="title">${entry.title}</div>
        <div class="tip">${entry.tip}</div>
      </div>
      <div class="overlay">
        <div class="pv-tag">遊戲實況預覽</div>
        <h2>${entry.title.split('：')[0]}</h2>
        <p>${entry.tip}</p>
        <div class="ov-btns">
          <button class="go">開始</button>
        </div>
      </div>
      ${opts.first ? '<div class="swipe-hint">玩膩了？往上滑換下一款 ↑</div>' : ''}
    </div>`;

  const canvas = post.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const stage = post.querySelector('.stage');
  const overlay = post.querySelector('.overlay');
  const scEl = post.querySelector('.sc');
  const bestChip = post.querySelector('.best-chip');
  const bsEl = post.querySelector('.bs');
  const likeBtn = post.querySelector('.like');
  const dislikeBtn = post.querySelector('.dislike');
  const state = { game: null, running: false };
  const gid = entry.id;
  const mechanicTemplate = mechanicTemplateFor(entry);
  /* 換皮優先序：改造草稿 → 這個 entry 自己的圖（remix 才有） */
  const getSprite = key => {
    return draftSpriteFor(gid, key) || spriteReady(entry.sprites[key]);
  };
  /* 便利函式：有換圖就置中等比畫出並回傳 true，沒有就回傳 false（讓遊戲畫預設外觀） */
  const drawSprite = (key, cx, cy, size, flip) => {
    const im = getSprite(key);
    if (!im) return false;
    const iw = mediaW(im), ih = mediaH(im);
    const s = Math.min(size / iw, size / ih), w = iw * s, h = ih * s;
    ctx.save(); ctx.translate(cx, cy); if (flip) ctx.scale(-1, 1);
    ctx.drawImage(im, -w / 2, -h / 2, w, h); ctx.restore();
    return true;
  };

  /* 實況預覽（attract mode）：滑到這格時，遊戲自己在標題後面隨機試玩 */
  const pv = { game: null, on: false, timer: null, restartT: null, swipeIv: null };
  const pvEnv = {
    W, H, ctx, beep: () => {}, setScore: () => {}, getSprite, sprite: drawSprite,
    over() {
      if (!pv.on) return;
      clearTimeout(pv.restartT);
      pv.restartT = setTimeout(() => { if (pv.on && !state.running) pv.game.start(); }, 900);
    }
  };
  function startPreview() {
    if (pv.on || state.running) return;
    pv.on = true;
    if (!pv.game) pv.game = entry.base.create(pvEnv);
    pv.game.start();
    schedulePvInput();
  }
  function stopPreview() {
    pv.on = false;
    clearTimeout(pv.timer); clearTimeout(pv.restartT); clearInterval(pv.swipeIv);
    if (pv.game) pv.game.stop();
  }
  function schedulePvInput() {
    pv.timer = setTimeout(() => {
      if (!pv.on) return;
      pvDemoInput();
      schedulePvInput();
    }, 350 + Math.random() * 550);
  }
  function pvDemoInput() {
    const x = W * (0.15 + Math.random() * 0.7), y = H * (0.25 + Math.random() * 0.55);
    pv.game.input('down', x, y);
    if (Math.random() < 0.45) {
      /* 偶爾來一段「水平」滑動（上下滑保留給 feed，遊戲互動不用垂直手勢） */
      let step = 0;
      const dx = (Math.random() < 0.5 ? -1 : 1) * (80 + Math.random() * 160), dy = (Math.random() - 0.5) * 50;
      clearInterval(pv.swipeIv);
      pv.swipeIv = setInterval(() => {
        if (!pv.on) return clearInterval(pv.swipeIv);
        step++;
        pv.game.input('move', x + dx * step / 6, y + dy * step / 6);
        if (step >= 6) { clearInterval(pv.swipeIv); pv.game.input('up', x + dx, y + dy); }
      }, 30);
    } else {
      setTimeout(() => { if (pv.on) pv.game.input('up', x, y); }, 90);
    }
  }

  const env = {
    W, H, ctx, beep, getSprite, sprite: drawSprite,
    setScore(n) { scEl.textContent = n; },
    over(score) {
      state.running = false;
      stage.classList.remove('playing');
      const snap = canvas.toDataURL('image/png');   /* 先抓結算畫面，等下實況會蓋掉 */
      const prev = bests[gid] || 0;
      const isBest = score > prev;
      if (isBest) { bests[gid] = score; submitScore(gid, score); }
      bestChip.style.display = ''; bsEl.textContent = bests[gid] || 0;
      overlay.innerHTML = `
        <div class="final">${score}</div>
        ${isBest && score > 0 ? '<div class="newbest">&#9733; 新紀錄</div>' : ''}
        <p>再挑戰一次，或往上滑玩下一款</p>
        <div class="ov-btns">
          <button class="go">再玩一次</button>
          ${mechanicTemplate ? '<button class="mechanic-create">用這個玩法創作</button>' : ''}
          <button class="share-score">分享成績</button>
        </div>`;
      overlay.classList.remove('hidden');
      wireStart(overlay);
      let cardURL = null;
      buildShareCard(snap, entry.title, score, u => cardURL = u);
      overlay.querySelector('.share-score').addEventListener('click', () => {
        if (cardURL) shareScoreCard(cardURL, entry, score);
        else toast('成績圖產生中，再按一次');
      });

    }
  };

  function begin() {
    stopPreview();
    ensureAudio();
    if (!state.game) state.game = entry.base.create(env);
    scEl.textContent = '0';
    overlay.classList.add('hidden');

  }

  function toLogical(e) {
    const r = canvas.getBoundingClientRect();

  }
  /* 手勢處理：分辨「點按/水平動作 → 給遊戲」與「明確上下滑 → 換遊戲」。
     門檻夠大，激動快點時的微小抖動不會誤觸換遊戲。 */
  const SWIPE = 46;   /* 垂直位移超過這個像素才判定為換遊戲 */
  let gest = null;
  canvas.addEventListener('pointerdown', e => {
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    gest = { id: e.pointerId, x0: e.clientX, y0: e.clientY, swiped: false, claimed: false, gaveDown: false };
    if (state.running && state.game) { const [x, y] = toLogical(e); state.game.input('down', x, y); gest.gaveDown = true; }
  });
  canvas.addEventListener('pointermove', e => {
    if (!gest || e.pointerId !== gest.id) return;
    const dx = e.clientX - gest.x0, dy = e.clientY - gest.y0;
    /* 軸向鎖定：第一次明顯移動就定調。水平主導 → 鎖給遊戲（之後垂直漂移不再換遊戲）；
       垂直主導且幅度夠大 → 換遊戲。都還沒到 → 維持未定（激動快點的小抖動不會誤判）。 */
    if (!gest.swiped && !gest.claimed) {
      if (Math.abs(dx) > 12 && Math.abs(dx) >= Math.abs(dy)) {
        gest.claimed = true;   /* 橫向操作，交給遊戲 */
      } else if (Math.abs(dy) > SWIPE && Math.abs(dy) > Math.abs(dx) * 1.15) {
        gest.swiped = true;
        if (gest.gaveDown && state.game) { const [x, y] = toLogical(e); state.game.input('up', x, y); }
        if (opts.standalone) { closeStandalone(); return; }   /* 單一遊戲視圖：上下滑＝退出，不接首頁的輪播 */
        const allPosts = [...feed.querySelectorAll(':scope > .post')];
        const myIdx = allPosts.indexOf(post);
        let ni = myIdx + (dy < 0 ? 1 : -1);                    /* 往上滑=下一款 */
        let wrap = false;
        if (ni >= allPosts.length) { ni = 0; wrap = true; }        /* 最後一款再往上滑 → 回到第一款 */
        else if (ni < 0) { ni = allPosts.length - 1; wrap = true; } /* 第一款往下滑 → 到最後一款 */
        const target = allPosts[ni];
        if (target) target.scrollIntoView({ behavior: wrap ? 'auto' : 'smooth' });
        return;
      }
    }
    if (!gest.swiped && state.running && state.game && (e.buttons || e.pointerType === 'touch')) {
      const [x, y] = toLogical(e); state.game.input('move', x, y);
    }
  });
  function endGesture(e) {
    if (!gest || e.pointerId !== gest.id) return;
    if (!gest.swiped && state.running && state.game) { const [x, y] = toLogical(e); state.game.input('up', x, y); }
    gest = null;
  }
  canvas.addEventListener('pointerup', endGesture);
  canvas.addEventListener('pointercancel', endGesture);

  const saveBtn = post.querySelector('.sv');
  likeBtn.addEventListener('click', () => toggleReaction(gid, 'like'));
  dislikeBtn.addEventListener('click', () => toggleReaction(gid, 'dislike'));
  saveBtn.addEventListener('click', () => toggleSave(gid));
  post.querySelector('.cmt').addEventListener('click', () => openComments(entry));
  post.querySelector('.shr').addEventListener('click', () => shareGame(entry));
  const rmxBtn = post.querySelector('.rmx');
  if (rmxBtn) rmxBtn.addEventListener('click', () => openRemix(entry));

  function refreshLike() {
    const st = likeState[gid];
    if (!st) return;
    likeBtn.classList.toggle('liked', st.mine);
    likeBtn.querySelector('.lc').textContent = st.count;
    dislikeBtn.classList.toggle('disliked', st.disliked);
    dislikeBtn.querySelector('.dc').textContent = st.dislikeCount;
  }
  function refreshSave() {
    saveBtn.classList.toggle('saved', !!saveState[gid]);
  }

  return {
    el: post, id: gid, entry, base: entry.base, remixOf: entry.remixOf, state, refreshLike, refreshSave,
    activate() {
      if (!state.running) startPreview();
    },
    deactivate() {
      stopPreview();
      stage.classList.remove('playing');
      if (state.game && state.running) { state.game.stop(); state.running = false; }
      if (!overlay.classList.contains('hidden')) return;
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<div class="pv-tag">遊戲實況預覽</div><h2>${entry.title.split('：')[0]}</h2><p>${entry.tip}</p>` +
        `<div class="ov-btns"><button class="go">開始</button></div>`;
      wireStart(overlay);
    }
  };
}

/* IntersectionObserver：滑到哪格就啟動哪格的實況預覽 */
const io = new IntersectionObserver(ents => {
  for (const en of ents) {
    const p = posts.find(p => p.el === en.target);
    if (!p) continue;
    if (en.isIntersecting && en.intersectionRatio >= 0.5) p.activate();
    else p.deactivate();
  }
}, { threshold: [0, 0.5, 1] });

/* entry 建構 */
function toBaseEntry(g) {
  return { id: g.id, base: g, title: g.title, author: g.author, tip: g.tip, bg: g.bg,
           remixSlots: g.remixSlots, sprites: {}, spriteData: {} };
}
function toRemixEntry(r) {
  const base = (window.GAMES || []).find(g => g.id === r.base_id);
  if (!base) return null;
  return { id: 'remix:' + r.id, base, title: r.name,
           author: '@' + (r.author || '玩家') + '·改造', tip: base.tip, bg: base.bg,
           remixSlots: base.remixSlots, sprites: spritesFromData(r.sprites),
           spriteData: r.sprites || {}, remixOf: r.base_id, remixMeta: r };
}
function addPost(po) { feed.appendChild(po.el); posts.push(po); io.observe(po.el); }

/* 首頁只放原始遊戲，最新註冊的遊戲排最前面（立即顯示，不等網路）。 */
[...(window.GAMES || [])].reverse().forEach((g, i) => addPost(makePost(toBaseEntry(g), { first: i === 0 })));

/* 已發佈的 remix：只快取資料，不放進首頁 feed。要看到某個 remix 一律透過
   「個人頁的我做的」／「改造面板的版本列表」／分享連結，用 openStandalone() 開單一遊戲視圖。 */
async function loadRemixGames() {
  if (!online) return;
  const { data, error } = await db.from('remixes').select('*').order('created_at', { ascending: false });
  if (error || !data) return;
  remixRows = data;
  for (const r of data) cacheRemixEntry(r);
  if (profileBox.classList.contains('open')) renderProfileGrid(profileTab);
  if (activeRemix) renderRemixVersions();
  goToHash(20);   /* 讓一開始就帶著 remix 分享連結進來的訪客能跳到那個版本 */
}

/* ---------- 單一遊戲視圖：remix 專用，不佔首頁的位置 ---------- */
const remixView = document.getElementById('remixView');
const remixViewStage = document.getElementById('remixViewStage');
let standalonePost = null;
function openStandalone(id) {
  const entry = entryFor(id);
  if (!entry) { toast('找不到這個遊戲'); return; }
  closeProfile(); closeRemix(); closeSheet();
  if (standalonePost) standalonePost.deactivate();
  remixViewStage.innerHTML = '';
  standalonePost = makePost(entry, { standalone: true });
  remixViewStage.appendChild(standalonePost.el);
  remixView.classList.add('open');
  setNavVisible(false);
  standalonePost.refreshLike(); standalonePost.refreshSave();
  standalonePost.activate();
}
function closeStandalone() {
  if (!remixView.classList.contains('open')) return;
  if (standalonePost) standalonePost.deactivate();
  remixView.classList.remove('open');
  setNavVisible(true);
  setTimeout(() => { remixViewStage.innerHTML = ''; standalonePost = null; }, 300);
}
document.getElementById('remixViewBack').addEventListener('click', closeStandalone);

/* 分享連結直達指定遊戲：base 遊戲在首頁 feed 裡找；remix 用單一遊戲視圖打開
   （remix 資料是非同步載入，找不到就重試等它進來） */
function goToHash(retries) {
  if (!location.hash) return;
  const id = decodeURIComponent(location.hash.slice(1));
  if (id.indexOf('remix:') === 0) {
    const entry = entryFor(id);
    if (entry) { openStandalone(id); return; }
    if (retries > 0) setTimeout(() => goToHash(retries - 1), 200);
    return;
  }
  const target = posts.find(p => p.id === id);
  if (target) {
    const jump = () => target.el.scrollIntoView();
    jump(); requestAnimationFrame(jump); setTimeout(jump, 250);   /* 打敗版面尚未穩定造成的回到頂端 */
  } else if (retries > 0) {
    setTimeout(() => goToHash(retries - 1), 200);
  }
}
goToHash(20);
window.addEventListener('hashchange', () => goToHash(20));

/* 桌機鍵盤 */
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  const p = posts.find(p => {
    const r = p.el.getBoundingClientRect();
    return r.top > -window.innerHeight/2 && r.top < window.innerHeight/2;
  });
  if (!p || !p.state.running || !p.state.game) return;
  if (e.key === 'ArrowLeft') { p.state.game.input('down', W*0.25, H/2); e.preventDefault(); }
  if (e.key === 'ArrowRight') { p.state.game.input('down', W*0.75, H/2); e.preventDefault(); }
  if (e.key === ' ' || e.key === 'ArrowUp') { p.state.game.input('down', W/2, H/2); e.preventDefault(); }
});

/* Toast */
let toastT = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2600);
}

loadLikes();
loadSaves();
loadRemixGames();

/* 投稿工具與沙盒遊戲使用的最小平台介面。 */
window.PlayFeedHost = {
  get db() { return db; },
  get user() { return user; },
  feed,
  icons: ICONS,
  displayName,
  requireLogin,
  secureWrite,
  toast,
  setNavVisible,
  setMainNavActive,
  closeProfile,
  closeStandalone,
  refreshProfile() { if (profileBox.classList.contains('open')) renderProfileGrid(profileTab); },
  toggleReaction,
  toggleSave,
  openComments,
  shareGame,
  submitScore
};
</script>
