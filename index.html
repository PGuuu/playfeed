<!DOCTYPE html>
<html lang="zh-Hant" class="booting">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>PlayFeed — 滑一下，玩一個</title>
<link rel="stylesheet" href="creator.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  :root {
    --main-nav-height: calc(70px + env(safe-area-inset-bottom));
    --game-top-height: calc(56px + env(safe-area-inset-top));
  }
  html, body { height: 100%; background: #fff; color: #262626; font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none; }
  html.booting, html.booting body { background: #fff; }
  #bootSplash { position: fixed; inset: 0; z-index: 200; display: grid; place-items: center;
    background: #fff; color: #262626; opacity: 1; visibility: visible; }
  #bootSplash.done { pointer-events: none; animation: bootSplashExit .72s ease forwards; }
  #bootSplash.done .boot-brand { animation: bootBrandSwipe .62s cubic-bezier(.55,.02,.36,1) forwards; }
  @keyframes bootBrandSwipe {
    0% { transform: translateY(-2vh); opacity: 1; }
    100% { transform: translateY(-115vh); opacity: .35; }
  }
  @keyframes bootSplashExit {
    0%, 68% { opacity: 1; visibility: visible; }
    100% { opacity: 0; visibility: hidden; }
  }
  .boot-brand { text-align: center; transform: translateY(-2vh); }
  .boot-logo { font-size: clamp(38px, 11vw, 64px); line-height: 1; font-weight: 900;
    letter-spacing: -.055em; color: #262626; }
  .boot-tagline { margin-top: 12px; color: #737373; font-size: 14px; font-weight: 650;
    letter-spacing: .12em; text-transform: lowercase; }
  /* 只有輸入框可以選字（留言、Email） */
  input, textarea { -webkit-user-select: text; user-select: text; }

  #feed { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none;
    overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
  #feed::-webkit-scrollbar { display: none; }

  .post { position: relative; height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always;
    display: flex; align-items: flex-start; justify-content: center; overflow: hidden; touch-action: pan-y; }
  .standalone-post { touch-action: none; }
  .stage { position: relative; width: 100%; height: calc(100dvh - var(--main-nav-height));
    margin-bottom: var(--main-nav-height); max-width: none; background: inherit; }
  .standalone-post .stage { height: 100dvh; margin-bottom: 0; }
  /* 首頁的垂直手勢交給原生 scroll-snap，水平手勢仍交給遊戲；
     個人頁開啟的單一遊戲則用互動式拖曳，以便即時顯示前後遊戲。 */
  canvas.game { width: 100%; height: calc(100% - var(--game-top-height)); margin-top: var(--game-top-height);
    display: block; touch-action: pan-y; }
  .standalone-post canvas.game { touch-action: none; }
  .sandbox-post .sandbox-frame-host,
  .sandbox-post .sandbox-input {
    position: absolute; left: 0; right: 0; top: var(--game-top-height); bottom: 0;
  }
  .sandbox-post .sandbox-input { touch-action: pan-y; }
  .sandbox-post.standalone-post .sandbox-input { touch-action: none; }
  @media (orientation: landscape) {
    .stage { width: min(100vw, calc((100dvh - var(--main-nav-height)) * 4 / 7));
      height: calc(100dvh - var(--main-nav-height)); }
    .standalone-post .stage { width: min(100vw, calc(100dvh * 4 / 7)); height: 100dvh; }
  }

  .hud { position: absolute; top: max(14px, env(safe-area-inset-top)); left: 16px; right: 120px;
    display: flex; align-items: center; gap: 10px; pointer-events: none; }
  .chip { background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 999px;
    padding: 6px 14px; font-size: 14px; font-weight: 500; }
  .score-chip b { font-size: 18px; font-weight: 600; margin-left: 4px; }

  #authChip { position: fixed; top: max(14px, env(safe-area-inset-top)); right: 14px; z-index: 40;
    border: none; cursor: pointer; color: #fff; font-family: inherit;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 600; }
  #authChip.on { background: #0095f6; }

  .rail { position: absolute; right: 10px; bottom: 110px; display: flex; flex-direction: column;
    gap: 14px; align-items: center; z-index: 5; transition: opacity 0.28s; }
  /* 遊戲進行中：淡出側邊鈕並停用點擊（防誤觸） */
  .stage.playing .rail { opacity: 0; pointer-events: none; }
  .rail button { background: none; border: none; color: #fff; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; font-family: inherit; }
  .rail .ic { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.14);
    backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
    font-size: 21px; transition: transform 0.12s; }
  .rail button:active .ic { transform: scale(0.85); }
  .rail button.liked .ic { background: #43b968; }
  .rail button.disliked .ic { background: #d83e65; }
  .rail button.saved .ic { background: #d9a13b; }
  .rail button.rmx .ic { background: rgba(0,149,246,.58); }
  /* 統一的線條圖示（取代原本的 emoji） */
  .ico { width: 1em; height: 1em; display: block; fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .rail button.liked .ico, .rail button.disliked .ico, .rail button.saved .ico { fill: currentColor; }
  .tico { display: inline-flex; vertical-align: -2px; font-size: 15px; margin-right: 5px; }

  .overlay { position: absolute; left: 0; right: 0; top: var(--game-top-height); bottom: 0;
    z-index: 4; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: transparent;
    text-align: center; padding: 24px; pointer-events: none; }
  .overlay.hidden { display: none; }
  .overlay-main { width: min(86%, 360px); display: flex; flex-direction: column; align-items: center;
    gap: 13px; padding: 16px 18px; border-radius: 20px; pointer-events: auto;
    color: #fff; border: 1px solid rgba(255,255,255,.34); background: rgba(255,255,255,.16);
    backdrop-filter: blur(3px); box-shadow: 0 10px 32px rgba(0,0,0,.12);
    text-shadow: 0 1px 7px rgba(0,0,0,.48); }
  .overlay h2 { font-size: 26px; font-weight: 700; }
  .overlay p { font-size: 15px; opacity: 0.92; line-height: 1.6; }
  .overlay-main .author-link { border: 0; background: transparent; color: #fff; cursor: pointer;
    font: 700 13px inherit; padding: 1px 8px; opacity: .9; }
  .pv-tag { font-size: 12px; font-weight: 600; color: #7de08c; text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    display: flex; align-items: center; gap: 6px; }
  .pv-tag::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #7de08c;
    animation: pvblink 1.2s ease-in-out infinite; }
  @keyframes pvblink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .overlay .go { border: none; cursor: pointer; background: #262626; color: #fff;
    font-family: inherit; font-size: 16px; font-weight: 600; padding: 12px 40px; border-radius: 999px; }
  .overlay .ov-btns { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
  .overlay .ov-btns.initial-actions { flex-direction: column; width: min(100%, 190px); }
  .overlay .ov-btns.initial-actions button { width: 100%; }
  .overlay .share-score { border: none; cursor: pointer; background: #efefef;
    color: #262626; font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px 22px;
    border-radius: 999px; backdrop-filter: blur(6px); }
  .overlay .mechanic-create { border: 1px solid rgba(255,255,255,.55); cursor: pointer;
    background: rgba(255,255,255,.16); color: #fff; font-family: inherit;
    font-size: 15px; font-weight: 600; padding: 12px 22px; border-radius: 999px; }
  .overlay .final { font-size: 44px; font-weight: 700; }
  .overlay .newbest { color: #ffd75e; font-size: 14px; font-weight: 600; }

  .swipe-hint { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
    font-size: 13px; opacity: 0.55; z-index: 4; pointer-events: none; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translate(-50%,0);} 50% { transform: translate(-50%,-8px);} }

  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.92); color: #111; font-size: 14px; font-weight: 500;
    padding: 10px 20px; border-radius: 999px; z-index: 90; opacity: 0; pointer-events: none;
    transition: opacity 0.25s; max-width: 86vw; text-align: center; }
  .toast.show { opacity: 1; }

  /* 留言面板 */
  #sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: #16161d; border-radius: 18px 18px 0 0; max-height: 68dvh;
    display: flex; flex-direction: column; transform: translateY(105%); transition: transform 0.25s; }
  #sheet.open { transform: translateY(0); }
  #sheet .head { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #sheet .head b { font-size: 15px; }
  #sheet .head button { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
  #cmtList { overflow-y: auto; padding: 8px 18px; flex: 1; min-height: 120px; }
  .cmt { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .cmt .who { font-size: 12px; color: #9a9ab0; margin-bottom: 3px; }
  .cmt .body { font-size: 14px; line-height: 1.5; }
  #cmtForm { display: flex; gap: 8px; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
  #cmtInput { flex: 1; background: #23232d; border: none; border-radius: 999px; color: #fff;
    font-family: inherit; font-size: 14px; padding: 11px 16px; outline: none; }
  #cmtSend { border: none; background: #0095f6; color: #fff; font-family: inherit;
    font-weight: 600; font-size: 14px; border-radius: 999px; padding: 0 20px; cursor: pointer; }

  /* Remix 改造面板 */
  #remixSheet { position: fixed; inset: 0; z-index: 68;
    background: #101016; max-height: none;
    display: none; flex-direction: column; }
  #remixSheet.open { display: flex; }
  #remixSheet .head { display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08); }
  #remixSheet .head b { font-size: 15px; }
  #remixSheet .head button { background: rgba(255,255,255,.1); border: none; color: #ddd;
    border-radius: 999px; padding: 8px 14px; font: 600 12px inherit; cursor: pointer; }
  #remixSheet .note { font-size: 12px; color: #8a8aa0; padding: 10px 18px 4px; line-height: 1.6; }
  #remixChoice { display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 18px; }
  #remixSheet.choosing #remixChoice { display: grid; width: min(100%, 760px); margin: auto; align-content: center; }
  #remixSheet.choosing #remixVersions,
  #remixSheet.choosing #remixNote,
  #remixSheet.choosing #remixSlots,
  #remixSheet.choosing #remixFoot { display: none; }
  .remix-choice {
    min-height: 128px; border: 1px solid rgba(255,255,255,.1); border-radius: 18px;
    background: #20202a; color: #fff; padding: 16px; text-align: left; cursor: pointer;
    font-family: inherit;
  }
  .remix-choice strong { display: block; font-size: 16px; }
  .remix-choice span { display: block; margin-top: 7px; color: #9b9bad; font-size: 12px; line-height: 1.55; }
  .remix-choice.mechanic { border-color: rgba(112,220,140,.32); background: rgba(112,220,140,.08); }
  .remix-choice.mechanic strong { color: #8bea9e; }
  .remix-choice:disabled { cursor: not-allowed; opacity: .42; }
  @media (max-width: 380px) {
    #remixChoice { grid-template-columns: 1fr; }
    .remix-choice { min-height: 104px; }
  }
  #remixSlots { flex: 1; overflow-y: auto; padding: 4px 18px calc(16px + env(safe-area-inset-bottom)); }
  .slot { display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06); }
  .slot .preview { width: 58px; height: 58px; border-radius: 12px; flex: none; overflow: hidden;
    display: flex; align-items: center; justify-content: center; font-size: 34px;
    background-color: #2a2a34;
    background-image: linear-gradient(45deg,#3a3a44 25%,transparent 25%),linear-gradient(-45deg,#3a3a44 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#3a3a44 75%),linear-gradient(-45deg,transparent 75%,#3a3a44 75%);
    background-size: 14px 14px; background-position: 0 0,0 7px,7px -7px,-7px 0; }
  .slot .preview img { width: 100%; height: 100%; object-fit: contain; }
  .slot .info { flex: 1; min-width: 0; }
  .slot .info .l { font-size: 14px; font-weight: 600; }
  .slot .info .h { font-size: 12px; color: #9a9ab0; margin-top: 2px; }
  .slot .acts { display: flex; flex-direction: column; gap: 6px; flex: none; }
  .slot .up { border: none; background: #0095f6; color: #fff; font-family: inherit; font-size: 13px;
    font-weight: 600; border-radius: 999px; padding: 8px 16px; cursor: pointer; white-space: nowrap; }
  .slot .rst { border: none; background: none; color: #8a8aa0; font-family: inherit; font-size: 12px;
    cursor: pointer; }
  .slot .rst[disabled] { opacity: 0.35; cursor: default; }
  #remixFoot { display: flex; gap: 8px; padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255,255,255,0.08); }
  #remixName { flex: 1; min-width: 0; background: #23232d; border: none; border-radius: 999px; color: #fff;
    font-family: inherit; font-size: 14px; padding: 11px 16px; outline: none; }
  #remixSave { border: none; background: #0095f6; color: #fff; font-family: inherit; font-weight: 600;
    font-size: 14px; border-radius: 999px; padding: 0 18px; cursor: pointer; white-space: nowrap; }
  #remixSave:disabled { opacity: 0.6; cursor: default; }
  /* 這個遊戲已有的改造版（橫向捲動的縮圖） */
  #remixVersions { display: flex; gap: 8px; overflow-x: auto; padding: 10px 18px 2px; scrollbar-width: none; }
  #remixVersions::-webkit-scrollbar { display: none; }
  #remixVersions:empty { display: none; }
  .verchip { flex: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; width: 62px; }
  .verchip .sw { width: 54px; height: 54px; border-radius: 12px; flex: none; }
  .verchip .nm { font-size: 11px; color: #bcbcd0; max-width: 62px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; text-align: center; }
  .verchip.cur .sw { outline: 2px solid #0095f6; outline-offset: 1px; }
  .vhead { font-size: 12px; color: #9a9ab0; padding: 12px 18px 0; }

  /* 登入視窗（Phuze magic link） */
  #login { position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; padding: 24px; }
  #login.open { display: flex; }
  #login .box { background: #1a1a22; border-radius: 18px; padding: 26px 22px; width: 100%;
    max-width: 340px; display: flex; flex-direction: column; gap: 14px; text-align: center; }
  #login h3 { font-size: 19px; }
  #login p { font-size: 13px; color: #a5a5ba; line-height: 1.6; }
  #phuze-widget { min-height: 52px; text-align: left; }
  #login .ghost { background: none; border: none; color: #8f8fa5; font-size: 13px;
    font-family: inherit; cursor: pointer; padding: 6px; }
  .backdrop { position: fixed; inset: 0; z-index: 55; display: none; }
  .backdrop.open { display: block; }

  /* 個人頁（IG 風格全螢幕 + 分頁 + 縮圖網格 + 底部導覽） */
  #profile { position: fixed; inset: 0; z-index: 65; background: #fff;
    display: none; flex-direction: column; }
  #profile.open { display: flex; }
  #notifications { position: fixed; inset: 0; z-index: 65; background: #fff; color: #262626;
    display: none; flex-direction: column; }
  #notifications.open { display: flex; }
  #searchPage { position: fixed; inset: 0; z-index: 65; background: #fff; color: #262626;
    display: none; flex-direction: column; }
  #searchPage.open { display: flex; }
  .search-head { padding: max(14px, env(safe-area-inset-top)) 16px 10px; border-bottom: 1px solid #efefef; }
  .search-head b { display: block; margin-bottom: 10px; font-size: 17px; }
  #searchInput { width: 100%; height: 42px; border: 0; border-radius: 10px; outline: none;
    background: #efefef; color: #262626; padding: 0 14px; font: 15px inherit; }
  #searchResults { flex: 1; overflow-y: auto; padding-bottom: var(--main-nav-height); }
  .search-section-title { padding: 18px 16px 8px; color: #737373; font-size: 12px; font-weight: 750; }
  .search-result { width: 100%; display: grid; grid-template-columns: 50px minmax(0,1fr); gap: 12px;
    align-items: center; border: 0; border-bottom: 1px solid #efefef; background: #fff;
    color: #262626; padding: 10px 16px; text-align: left; cursor: pointer; font-family: inherit; }
  .search-result:active { background: #f7f7f7; }
  .search-result-thumb { width: 50px; height: 50px; border-radius: 10px; display: grid;
    place-items: center; overflow: hidden; background: #efefef center/cover no-repeat;
    color: #262626; font-size: 19px; font-weight: 750; }
  .search-result.account .search-result-thumb { border-radius: 50%; }
  .search-result-copy { min-width: 0; }
  .search-result-copy strong, .search-result-copy span { display: block; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .search-result-copy strong { font-size: 14px; }
  .search-result-copy span { margin-top: 3px; color: #737373; font-size: 12px; }
  .search-empty { padding: 70px 24px; color: #737373; text-align: center; font-size: 14px; }
  #notificationList { flex: 1; overflow-y: auto; padding-bottom: var(--main-nav-height); }
  .notification-empty { padding: 64px 24px; color: #737373; text-align: center; font-size: 14px; }
  .notification-item { display: grid; grid-template-columns: 42px minmax(0,1fr); gap: 12px;
    align-items: center; padding: 13px 18px; border-bottom: 1px solid #efefef; cursor: pointer; }
  .notification-icon { width: 42px; height: 42px; display: grid; place-items: center; border-radius: 50%;
    background: #f2f2f2; color: #262626; font-size: 19px; }
  .notification-text { min-width: 0; font-size: 13px; line-height: 1.45; }
  .notification-text b { font-weight: 750; }
  .notification-time { display: block; margin-top: 3px; color: #8e8e8e; font-size: 11px; }
  #navNotificationsMain { position: relative; }
  #notificationBadge { position: absolute; top: 4px; left: 50%; margin-left: 7px; min-width: 16px; height: 16px;
    padding: 0 4px; display: grid; place-items: center; border-radius: 999px; background: #ed4956;
    color: #fff; font: 700 10px/1 system-ui; }
  #notificationBadge[hidden] { display: none; }
  .phead { display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 12px; }
  .phead b { font-size: 17px; font-weight: 700; }
  .phead button { background: rgba(255,255,255,0.1); border: none; color: #ccc;
    font-family: inherit; font-size: 12px; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
  .phead button.following { background: rgba(67,185,104,.2); color: #8be2a0; }
  .ptabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .ptabs button { flex: 1; background: none; border: none; color: #8a8aa0; font-family: inherit;
    font-size: 13px; font-weight: 600; padding: 12px 0; cursor: pointer; border-bottom: 2px solid transparent; }
  .ptabs button.active { color: #fff; border-bottom-color: #fff; }
  .ptabs button[hidden] { display: none; }
  .profile-summary { padding: 12px 18px 14px; border-bottom: 1px solid #efefef; }
  .profile-summary-row { display: flex; align-items: center; gap: 22px; }
  #profileAvatar { width: 76px; height: 76px; flex: none; border-radius: 50%; display: grid;
    place-items: center; overflow: hidden; background: #efefef center/cover no-repeat; color: #262626;
    font-size: 28px; font-weight: 750; }
  #profileAvatar.editable { cursor: pointer; box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px #dbdbdb; }
  .profile-stats { flex: 1; display: grid; grid-template-columns: repeat(3,1fr); text-align: center; gap: 8px; }
  .profile-stat b { display: block; font-size: 17px; }
  .profile-stat span { display: block; margin-top: 2px; color: #737373; font-size: 12px; }
  #profileBio { margin-top: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  #profileWebsite { display: inline-block; margin-top: 5px; color: #00376b; font-size: 13px;
    font-weight: 650; text-decoration: none; overflow-wrap: anywhere; }
  #profileEditBtn { width: 100%; margin-top: 12px; border: 0; border-radius: 8px; padding: 8px 12px;
    background: #efefef; color: #262626; font: 650 13px inherit; cursor: pointer; }
  #profileEditor { display: grid; gap: 8px; margin-top: 12px; }
  #profileEditor[hidden] { display: none; }
  #profileEditor input, #profileEditor textarea { width: 100%; border: 1px solid #dbdbdb; border-radius: 8px;
    background: #fafafa; color: #262626; padding: 9px 11px; font: 13px/1.4 inherit; resize: vertical; }
  .profile-editor-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .profile-editor-actions button { border: 0; border-radius: 8px; padding: 8px 14px; cursor: pointer;
    background: #efefef; color: #262626; font: 650 13px inherit; }
  .profile-editor-actions button[type="submit"] { background: #0095f6; color: #fff; }
  #pgrid { flex: 1; min-height: 0; overflow-y: auto; display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr)); grid-auto-flow: row;

/* ---------- 全域：畫布尺寸與音效（遊戲包會用到） ---------- */
const W = 400, H = 700;
let AC = null;
function ensureAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}
function beep(f1, f2, dur, vol, type) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f1, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
</script>

const authChip = document.getElementById('authChip');
function displayName(u) {
  const e = (u && u.email) || '';
  return e ? e.split('@')[0].slice(0, 12) : '玩家';
}
function setUser(u) {
  user = u;
  authChip.textContent = u ? displayName(u) : '登入';
  authChip.classList.toggle('on', !!u);
  setTimeout(() => {
    refreshOfficialAuthors();
    if (window.PlayFeedCreator) {
      window.PlayFeedCreator.refreshAuthors();
      window.PlayFeedCreator.syncOfficialGames();
    }
    if (u) setTimeout(() => loadNotifications(false), 900);
  }, 0);
}
function currentPhuzeToken(session) {
  return String(
    session?.token ||
    session?.sessionToken ||
    session?.accessToken ||
    localStorage.getItem('phuze_session') ||
    ''
  );
}
async function secureWrite(action, payload = {}) {
  if (!phuzeToken) throw new Error('登入已失效，請重新登入');
  const response = await fetch('/api/write', {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${phuzeToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ action, ...payload })
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.ok) {
    if (response.status === 401) {
      phuzeToken = '';
      setUser(null);
    }
    throw new Error(result.error || '操作失敗，請稍後再試');
  }
  return result;
}

function searchGames() {
  const games = [];
  for (const row of window.PlayFeedCreator?.rows || []) {
    games.push({
      id: `game:${row.slug}`,
      title: row.title || row.slug,
      authorId: row.author_id,
      authorName: row.author_name || '玩家',
      description: row.description || row.tip || '',
      bg: row.bg || '#efefef',
      screenshot: row.screenshot || '',
    });
  }
  for (const row of remixRows || []) {
    games.push({
      id: `remix:${row.id}`,
      title: row.name || '改造遊戲',
      authorId: row.user_id,
      authorName: row.author || '玩家',
      description: '換皮改造',
      bg: baseEntryById(row.base_id)?.bg || '#efefef',
      screenshot: '',
    });
  }
  return uniqueProfileEntries(games);
}
function searchAccounts() {
  const accounts = new Map();
  const add = (id, name) => {
    if (!id) return;
    const detail = profileDetails[id] || {};
    accounts.set(id, {
      id,
      name: detail.display_name || name || '玩家',
      bio: detail.bio || '',
      avatar: detail.avatar || '',
    });
  };
  for (const row of window.PlayFeedCreator?.rows || []) add(row.author_id, row.author_name);
  for (const row of remixRows || []) add(row.user_id, row.author);
  for (const id of Object.keys(profileDetails)) add(id, profileDetails[id]?.display_name);
  return [...accounts.values()];
}
async function loadSearchProfiles() {
  if (searchProfileIndexLoaded || !online) return;
  searchProfileIndexLoaded = true;
  const { data, error } = await db.from('comments').select('game_id,user_id,name,body')
    .like('game_id', PROFILE_PREFIX + '%').order('created_at', { ascending: false }).limit(500);
  if (error) return;
  for (const row of data || []) {
    if (profileDetails[row.user_id]) continue;
    try {
      const stored = JSON.parse(row.body);
      profileDetails[row.user_id] = {
        display_name: stored.display_name || stored.d || row.name || '玩家',
        bio: stored.bio || stored.b || '',
        website: stored.website || stored.w || '',
      };
    } catch (_) {}
  }
}
function appendSearchTitle(text) {
  const title = document.createElement('div');
  title.className = 'search-section-title';
  title.textContent = text;
  searchResults.appendChild(title);
}
function renderSearchResults() {
  const query = searchInput.value.trim().toLocaleLowerCase('zh-Hant');
  searchResults.innerHTML = '';
  if (!query) {
    searchResults.innerHTML = '<div class="search-empty">輸入遊戲名稱或創作者帳號</div>';
    return;
  }
  const accounts = searchAccounts().filter(account =>
    `${account.name} ${account.bio}`.toLocaleLowerCase('zh-Hant').includes(query)
  ).slice(0, 30);
  const games = searchGames().filter(game =>
    `${game.title} ${game.description} ${game.authorName}`.toLocaleLowerCase('zh-Hant').includes(query)
  ).slice(0, 60);
  if (accounts.length) appendSearchTitle('帳號');
  for (const account of accounts) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'search-result account';
    const thumb = document.createElement('span');
    thumb.className = 'search-result-thumb';
    if (account.avatar) thumb.style.backgroundImage = `url("${account.avatar}")`;
    else thumb.textContent = [...account.name][0]?.toUpperCase() || 'P';
    const copy = document.createElement('span');
    copy.className = 'search-result-copy';
    const name = document.createElement('strong'); name.textContent = account.name;
    const bio = document.createElement('span'); bio.textContent = account.bio || '查看創作者頁面';
    copy.append(name, bio); button.append(thumb, copy);
    button.addEventListener('click', () => {
      closeSearch();
      openAuthorProfile(account.id, account.name);
    });
    searchResults.appendChild(button);
  }
  if (games.length) appendSearchTitle('遊戲');
  for (const game of games) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'search-result game';
    const thumb = document.createElement('span');
    thumb.className = 'search-result-thumb';
    thumb.style.backgroundColor = game.bg;
    if (game.screenshot) thumb.style.backgroundImage = `url("${game.screenshot}")`;
    else thumb.textContent = '🎮';
    const copy = document.createElement('span');
    copy.className = 'search-result-copy';
    const title = document.createElement('strong'); title.textContent = game.title;
    const author = document.createElement('span'); author.textContent = `@${game.authorName}`;
    copy.append(title, author); button.append(thumb, copy);
    button.addEventListener('click', () => {
      closeSearch();
      openStandalone(game.id);
    });
    searchResults.appendChild(button);
  }
  if (!accounts.length && !games.length) {
    searchResults.innerHTML = '<div class="search-empty">找不到符合的帳號或遊戲</div>';
  }
}
async function openSearch() {
  if (window.PlayFeedCreator) window.PlayFeedCreator.close();
  closeProfile(); closeNotifications(); closeStandalone();
  searchPage.classList.add('open');
  setMainNavActive('search');
  await loadSearchProfiles();
  renderSearchResults();
  setTimeout(() => searchInput.focus(), 30);
}
function closeSearch() {
  searchPage.classList.remove('open');
}
searchInput.addEventListener('input', renderSearchResults);

const profileBox = document.getElementById('profile');
let profileTab = 'created';
let profileOwner = null;
function ownProfileView() {

}
function updateProfileAction() {

function renderProfileSummary() {

async function loadProfileDetail(ownerId) {
  if (!online || !ownerId) return;
  const [profileResult, avatarResult] = await Promise.all([
    db.from('comments').select('body,name,created_at')
      .eq('game_id', PROFILE_PREFIX + ownerId).order('created_at', { ascending: false }).limit(1),
    db.from('comments').select('game_id,body')
      .like('game_id', AVATAR_PREFIX + ownerId + ':%').order('game_id', { ascending: true }).limit(400),
  ]);
  const { data, error } = profileResult;
  const existing = profileDetails[ownerId] || {};
  if (!error && data?.[0]) {
    try {
      const stored = JSON.parse(data[0].body);
      profileDetails[ownerId] = {
        ...existing,
        display_name: stored.display_name || stored.d || data[0].name || '玩家',
        bio: stored.bio || stored.b || '',
        website: stored.website || stored.w || '',
      };
    } catch (_) {}
  }
  if (!avatarResult.error && avatarResult.data?.length) {
    const image = avatarResult.data.map(row => row.body || '').join('');
    if (/^data:image\/(?:png|jpeg|webp);base64,/i.test(image)) {
      profileDetails[ownerId] = { ...(profileDetails[ownerId] || existing), avatar: image };
    }
  }
  if (profileOwner?.id === ownerId) renderProfileSummary();
}
function configureProfileTabs() {
  const own = ownProfileView();
  document.querySelectorAll('.ptabs button').forEach(button => {
    const personal = ['saved', 'liked', 'disliked'].includes(button.dataset.tab);
    button.hidden = !own && personal;

    button.classList.toggle('active', button.dataset.tab === profileTab)

  } else if (user) {
    profileOwner = { id: user.id, name: displayName(user) };

document.getElementById('profileEditor').addEventListener('submit', async event => {
  event.preventDefault();

document.getElementById('profileAvatar').addEventListener('click', () => {
  if (ownProfileView()) document.getElementById('profileAvatarInput').click();
});
document.getElementById('profileAvatarInput').addEventListener('change', async event => {
  const file = event.target.files?.[0];
  event.target.value = '';
  if (!file || !ownProfileView() || !requireLogin()) return;
  if (!/^image\/(?:png|jpeg|webp)$/i.test(file.type) || file.size > 8_000_000) {
    toast('請選擇 8MB 以下的 PNG、JPG 或 WebP 圖片');
    return;
  }
  try {
    const source = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const image = new Image();
        image.onerror = reject;
        image.onload = () => resolve(image);
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
    const side = Math.min(source.naturalWidth, source.naturalHeight);
    const canvas = document.createElement('canvas');
    canvas.width = 160;
    canvas.height = 160;
    const context = canvas.getContext('2d');
    context.drawImage(
      source,
      (source.naturalWidth - side) / 2,
      (source.naturalHeight - side) / 2,
      side,
      side,
      0,
      0,
      160,
      160
    );
    let image = canvas.toDataURL('image/webp', .78);
    if (image.length > 75_000) image = canvas.toDataURL('image/jpeg', .62);
    if (image.length > 75_000) throw new Error('圖片壓縮後仍然太大');
    const result = await secureWrite('avatar', { image });
    profileDetails[user.id] = { ...(profileDetails[user.id] || {}), avatar: result.avatar };
    renderProfileSummary();
    toast('頭貼已更新');
  } catch (error) {
    toast('頭貼上傳失敗：' + (error.message || '請換一張圖片'));
  }
});

/* ---------- 通知：追蹤、按讚、儲存 ---------- */
const notificationsBox = document.getElementById('notifications');
let notificationEvents = [];
function ownedNotificationGames() {
  if (!user) return new Map();
  const created = window.PlayFeedCreator ? window.PlayFeedCreator.profileEntries(user.id) : [];
  const remixed = remixRows.filter(row => row.user_id === user.id).map(cacheRemixEntry).filter(Boolean);
  return new Map([...created, ...remixed].map(entry => [entry.id, entry]));
}
function notificationTime(value) {
  const seconds = Math.max(0, Math.floor((Date.now() - new Date(value).getTime()) / 1000));
  if (seconds < 60) return '剛剛';
  if (seconds < 3600) return `${Math.floor(seconds / 60)} 分鐘前`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)} 小時前`;
  if (seconds < 86400 * 7) return `${Math.floor(seconds / 86400)} 天前`;
  return new Date(value).toLocaleDateString('zh-TW');
}
function renderNotifications(markRead = false) {
  const list = document.getElementById('notificationList');
  list.innerHTML = '';
  if (!notificationEvents.length) {
    const empty = document.createElement('div');
    empty.className = 'notification-empty';
    empty.textContent = '還沒有新通知。';
    list.appendChild(empty);
  }
  for (const event of notificationEvents) {
    const item = document.createElement('div');
    item.className = 'notification-item';
    const icon = document.createElement('div');
    icon.className = 'notification-icon';
    icon.textContent = event.type === 'follow' ? '＋' : (event.type === 'like' ? '♡' : '▱');
    const text = document.createElement('div');
    text.className = 'notification-text';
    const actor = document.createElement('b');
    actor.textContent = event.actorName;
    const message = document.createTextNode(event.type === 'follow'
      ? ' 開始追蹤你'
      : ` ${event.type === 'like' ? '按讚了' : '儲存了'}《${event.gameTitle}》`);
    const time = document.createElement('span');
    time.className = 'notification-time';
    time.textContent = notificationTime(event.createdAt);
    text.append(actor, message, time);
    item.append(icon, text);
    item.addEventListener('click', () => {
      if (event.gameId) {
        closeNotifications();
        openStandalone(event.gameId);
      } else if (event.actorId) {
        closeNotifications();
        openAuthorProfile(event.actorId, event.actorName);
      }
    });
    list.appendChild(item);
  }
  const readKey = user ? `playfeed-notifications-read:${user.id}` : '';
  const previousRead = Number(localStorage.getItem(readKey) || 0);
  const unread = notificationEvents.filter(event => new Date(event.createdAt).getTime() > previousRead).length;
  const badge = document.getElementById('notificationBadge');
  badge.hidden = markRead || unread === 0;
  badge.textContent = unread > 99 ? '99+' : String(unread);
  if (markRead && readKey) localStorage.setItem(readKey, String(Date.now()));
}
async function loadNotifications(markRead = false) {
  if (!online || !user) return;
  const owned = ownedNotificationGames();
  const [likesResult, savesResult, profilesResult] = await Promise.all([
    db.from('likes').select('game_id,user_id,created_at').order('created_at', { ascending: false }).limit(250),
    db.from('saves').select('game_id,user_id,created_at').order('created_at', { ascending: false }).limit(250),
    db.from('comments').select('game_id,user_id,name,body,created_at')
      .like('game_id', PROFILE_PREFIX + '%').order('created_at', { ascending: false }).limit(500),
  ]);
  const actorNames = {};
  for (const row of profilesResult.data || []) {
    if (!row.game_id.startsWith(PROFILE_PREFIX)) continue;
    try {
      const stored = JSON.parse(row.body);
      actorNames[row.user_id] = stored.display_name || stored.d || row.name || '玩家';
    } catch (_) {
      actorNames[row.user_id] = row.name || '玩家';
    }
  }
  const events = [];
  for (const row of likesResult.data || []) {
    if (row.user_id === user.id) continue;
    if (row.game_id === FOLLOW_PREFIX + user.id) {
      events.push({ type: 'follow', actorId: row.user_id, actorName: actorNames[row.user_id] || '玩家',
        createdAt: row.created_at });
      continue;
    }
    if (row.game_id.startsWith(DISLIKE_PREFIX) || row.game_id.startsWith(FOLLOW_PREFIX)) continue;
    const game = owned.get(row.game_id);
    if (game) events.push({ type: 'like', actorId: row.user_id, actorName: actorNames[row.user_id] || '玩家',
      gameId: row.game_id, gameTitle: game.title.split('：')[0], createdAt: row.created_at });
  }
  for (const row of savesResult.data || []) {
    if (row.user_id === user.id) continue;
    const game = owned.get(row.game_id);
    if (game) events.push({ type: 'save', actorId: row.user_id, actorName: actorNames[row.user_id] || '玩家',
      gameId: row.game_id, gameTitle: game.title.split('：')[0], createdAt: row.created_at });
  }
  notificationEvents = events.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 150);
  renderNotifications(markRead);
}
function openNotifications() {
  if (!user) return openLogin();
  if (window.PlayFeedCreator) window.PlayFeedCreator.close();
  closeProfile();
  closeSearch();
  closeStandalone();
  notificationsBox.classList.add('open');
  setMainNavActive('notifications');
  loadNotifications(true);
}
function closeNotifications() {
  notificationsBox.classList.remove('open');
  if (!profileBox.classList.contains('open')) setMainNavActive('home');
}
document.getElementById('notificationReadAll').addEventListener('click', () => renderNotifications(true));

function profileData(tab) {
  const ownerId = profileOwner && profileOwner.id;
  if (tab === 'created') {
    const official = posts.map(post => post.entry).filter(entry => entry.authorId === ownerId);
    const submitted = window.PlayFeedCreator ? window.PlayFeedCreator.profileEntries(ownerId) : [];
    return uniqueProfileEntries([...submitted, ...official]);
  }
  if (tab === 'remixed') {
    return uniqueProfileEntries(
      remixRows.filter(r => r.user_id === ownerId).map(cacheRemixEntry).filter(Boolean)
    );
  }
  if (!ownProfileView()) return [];
  const st = tab === 'saved' ? saveState : likeState;
  return uniqueProfileEntries(Object.keys(st)
    .filter(id => tab === 'saved' ? st[id] :
      (tab === 'disliked' ? st[id]?.disliked : st[id]?.mine))
    .map(entryFor).filter(Boolean));
}
function uniqueProfileEntries(entries) {
  const seen = new Set();
  return entries.filter(entry => {
    if (!entry?.id || seen.has(entry.id)) return false;
    seen.add(entry.id);
    return true;
  });
}
const profilePreviewJobs = new Map();
function updateProfileGridRowHeight() {
  const grid = document.getElementById('pgrid');
  const width = grid.clientWidth;
  if (!width) return;
  const columnWidth = Math.max(1, (width - 12) / 3);
  grid.style.setProperty('--profile-grid-row-height', `${columnWidth * 7 / 4}px`);
}
if ('ResizeObserver' in window) {
  new ResizeObserver(updateProfileGridRowHeight).observe(document.getElementById('pgrid'));
} else {
  window.addEventListener('resize', updateProfileGridRowHeight);
}
function captureBuiltInThumbnail(entry) {
  if (!entry?.base?.create) return Promise.resolve(null);
  if (entry.screenshot) return Promise.resolve(entry.screenshot);
  if (profilePreviewJobs.has(entry.id)) return profilePreviewJobs.get(entry.id);
  const job = new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const getSprite = key => spriteReady(entry.sprites && entry.sprites[key]);
    const drawSprite = (key, cx, cy, size, flip) => {
      const image = getSprite(key);
      if (!image) return false;
      const scale = Math.min(size / mediaW(image), size / mediaH(image));
      const width = mediaW(image) * scale, height = mediaH(image) * scale;
      ctx.save(); ctx.translate(cx, cy); if (flip) ctx.scale(-1, 1);
      ctx.drawImage(image, -width / 2, -height / 2, width, height); ctx.restore();
      return true;
    };
    let game = null;
    let finished = false;
    let inputTimer = null;
    let captureTimer = null;
    const finish = () => {
      if (finished) return;
      finished = true;
      clearInterval(inputTimer); clearTimeout(captureTimer);
      try { game?.stop(); } catch (_) {}
      let image = null;
      try { image = canvas.toDataURL('image/webp', .78); } catch (_) {}
      if (image) entry.screenshot = image;
      resolve(image);
    };
    const env = {
      W, H, ctx, beep: () => {}, getSprite, sprite: drawSprite,
      setScore: () => {}, over: () => setTimeout(finish, 30)
    };
    try {
      game = entry.base.create(env);
      game.start();
      inputTimer = setInterval(() => {
        const x = 60 + Math.random() * 280, y = 130 + Math.random() * 450;
        game.input('down', x, y);
        if (Math.random() < .45) game.input('move', Math.max(20, Math.min(380, x + (Math.random() - .5) * 180)), y);
        setTimeout(() => { if (!finished) game.input('up', x, y); }, 80);
      }, 180);
      captureTimer = setTimeout(finish, 1500);
    } catch (_) {
      finish();
    }
  });
  profilePreviewJobs.set(entry.id, job);
  return job;
}
function profileThumbnailFor(entry) {
  if (entry.userScript && window.PlayFeedCreator) {
    return window.PlayFeedCreator.captureThumbnail(entry.id, false, entry);
  }
  if (entry.screenshot) return Promise.resolve(entry.screenshot);
  return captureBuiltInThumbnail(entry);
}
let profileGridObserver = null;
function renderProfileGrid(tab) {
  const grid = document.getElementById('pgrid');
  const items = profileData(tab);
  updateProfileGridRowHeight();
  profileGridObserver?.disconnect();
  const observer = new IntersectionObserver(entries => {
    for (const observed of entries) {
      if (!observed.isIntersecting) continue;
      observer.unobserve(observed.target);
      observed.target.loadPreview?.();
    }
  }, { root: grid, rootMargin: '220px 0px' });
  profileGridObserver = observer;
  grid.innerHTML = '';
  if (!items.length) {
    const msg = { created: '還沒有自創遊戲。到「創作」貼上 Script，就能發布第一款。',
      remixed: '還沒有改造遊戲。從 Feed 選一款支援改造的遊戲開始。',
      saved: '還沒有收藏。看到喜歡的遊戲按「儲存」。',
      liked: '還沒有按讚的遊戲。', disliked: '還沒有倒讚的遊戲。' }[tab];
    const empty = document.createElement('div');

/* ---------- 按讚 ---------- */
function emptyReaction() {
  return { count: 0, mine: false, dislikeCount: 0, disliked: false };
}
function reactionState(gameId) {
  return likeState[gameId] || (likeState[gameId] = emptyReaction());
}
function reactionDbKey(gameId, reaction) {
  return reaction === 'dislike' ? DISLIKE_PREFIX + gameId : gameId;
}
async function loadLikes() {
  if (!online) return;
  const { data, error } = await db.from('likes').select('game_id,user_id');
  if (error || !data) return;
  for (const key of Object.keys(likeState)) delete likeState[key];
  for (const p of posts) likeState[p.id] = emptyReaction();
  for (const key of Object.keys(followState)) delete followState[key];
  for (const key of Object.keys(followingCounts)) delete followingCounts[key];
  for (const row of data) {
    if (row.game_id.startsWith(FOLLOW_PREFIX)) {
      const authorId = row.game_id.slice(FOLLOW_PREFIX.length);
      const state = followState[authorId] || (followState[authorId] = { count: 0, mine: false });
      state.count++;
      followingCounts[row.user_id] = (followingCounts[row.user_id] || 0) + 1;
      if (user && row.user_id === user.id) state.mine = true;
      continue;
    }
    const isDislike = row.game_id.startsWith(DISLIKE_PREFIX);
    const gameId = isDislike ? row.game_id.slice(DISLIKE_PREFIX.length) : row.game_id;
    const st = reactionState(gameId);
    if (isDislike) {
      st.dislikeCount++;
      if (user && row.user_id === user.id) st.disliked = true;
    } else {
      st.count++;
      if (user && row.user_id === user.id) st.mine = true;
    }
  }
  for (const p of posts) p.refreshLike();
  if (profileBox.classList.contains('open')) { updateProfileAction(); renderProfileSummary(); }
}
function refreshPost(gameId) {
  const p = posts.find(p => p.id === gameId) || (standalonePost && standalonePost.id === gameId ? standalonePost : null);
  if (p) { p.refreshLike(); p.refreshSave(); }
}
async function toggleReaction(gameId, reaction) {
  if (!requireLogin(() => toggleReaction(gameId, reaction))) return;
  const st = reactionState(gameId);
  const previous = { ...st };
  const isLike = reaction === 'like';
  const active = isLike ? st.mine : st.disliked;
  let nextReaction = null;

  if (active) {
    if (isLike) { st.mine = false; st.count = Math.max(0, st.count - 1); }
    else { st.disliked = false; st.dislikeCount = Math.max(0, st.dislikeCount - 1); }
  } else {
    if (isLike) {
      if (st.disliked) {
        st.disliked = false;
        st.dislikeCount = Math.max(0, st.dislikeCount - 1);
      }
      st.mine = true; st.count++;
    } else {
      if (st.mine) {
        st.mine = false;
        st.count = Math.max(0, st.count - 1);
      }
      st.disliked = true; st.dislikeCount++;
    }
    nextReaction = reaction;
  }
  refreshPost(gameId);
  try {
    await secureWrite('reaction', { gameId, reaction: nextReaction });
  } catch (error) {
    Object.assign(st, previous);
    refreshPost(gameId);
    toast('操作失敗：' + error.message);
    return;
  }
  if (window.PlayFeedCreator) window.PlayFeedCreator.refreshInteractions();
  if (profileBox.classList.contains('open')) renderProfileGrid(profileTab);
}

/* Remix 資料快取：remixRows 是後端原始資料，entry 是要餵給 makePost/UI 的整理過格式。

function processUpload(file, cb) {
  if (!file || !file.type.startsWith('image/')) { toast('請上傳圖片檔（支援透明圖檔）'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 240, sc = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * sc)), h = Math.max(1, Math.round(img.height * sc));
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/png'));
    };
    img.onerror = () => toast('圖片讀取失敗');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
const remixSheet = document.getElementById('remixSheet');

/* 槽位預覽：畫出元素的輪廓＋你上傳的圖，讓你知道圖會怎麼縮放對齊 */
function drawSlotPreview(cvs, slot, cur) {
  const S = 58, pad = 7, ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, S, S);
  const shape = slot.shape || 'free';
  let bw = S - 2 * pad, bh = S - 2 * pad;
  if (shape === 'wide') bh = 32;
  else if (shape === 'tall') bw = 34;
  const bx = (S - bw) / 2, by = (S - bh) / 2;
  const shapePath = () => {
    ctx.beginPath();
    if (shape === 'circle') ctx.arc(S / 2, S / 2, Math.min(bw, bh) / 2, 0, 6.283);
    else ctx.roundRect(bx, by, bw, bh, 6);
  };
  const im = cur && cur.img;
  if (im && im.complete && im.naturalWidth) {
    const sc = Math.min(bw / im.width, bh / im.height), w = im.width * sc, h = im.height * sc;
    ctx.drawImage(im, (S - w) / 2, (S - h) / 2, w, h);
  } else {
    ctx.globalAlpha = 0.5; ctx.font = Math.min(bw, bh) * 0.78 + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(slot.default, S / 2, S / 2 + 2); ctx.globalAlpha = 1;
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
  shapePath(); ctx.stroke(); ctx.setLineDash([]);
}
function renderRemixSlots() {

      '<button class="rst"' + (changed ? '' : ' disabled') + '>還原</button></div>';

/* 一個 entry = 基本遊戲 或 已發佈的 remix。都用 entry.base.create() 跑，靠 getSprite 換皮。 */
function makePost(entry, opts) {
  opts = opts || {};
  const post = document.createElement('section');
  post.className = 'post';
  if (opts.standalone) post.classList.add('standalone-post');
  post.style.background = entry.bg;
  post.innerHTML = `
    <div class="stage">
      <canvas class="game" width="${W}" height="${H}"></canvas>
      <div class="hud">
        <span class="chip score-chip">分數<b class="sc">0</b></span>
        <span class="chip best-chip" style="display:none">最佳 <span class="bs">0</span></span>
      </div>
      <div class="rail">
        <button class="like" aria-label="按讚"><span class="ic">${ICONS.like}</span><span class="lc">0</span></button>
        <button class="dislike" aria-label="倒讚"><span class="ic">${ICONS.dislike}</span><span class="dc">0</span></button>
        <button class="cmt"><span class="ic">${ICONS.comment}</span><span>留言</span></button>
        <button class="sv"><span class="ic">${ICONS.save}</span><span>儲存</span></button>
        <button class="shr"><span class="ic">${ICONS.share}</span><span>分享</span></button>
      </div>
      <div class="overlay">
        <div class="overlay-main">
          <button class="author-link">${entry.author}</button>
          <h2>${entry.title.split('：')[0]}</h2>
          <div class="ov-btns initial-actions">
            <button class="go">開始</button>
            <button class="mechanic-create">二創</button>
          </div>
        </div>
      </div>
      ${opts.first ? '<div class="swipe-hint">玩膩了？往上滑換下一款 ↑</div>' : ''}
    </div>`;

  const canvas = post.querySelector('canvas');
  const renderDpr = Math.min(Math.max(window.devicePixelRatio || 1, 1), 3);
  const ctx = canvas.getContext('2d');
  const stage = post.querySelector('.stage');
  const overlay = post.querySelector('.overlay');
  const scEl = post.querySelector('.sc');
  const bestChip = post.querySelector('.best-chip');
  const bsEl = post.querySelector('.bs');
  const likeBtn = post.querySelector('.like');
  const dislikeBtn = post.querySelector('.dislike');
  const state = { game: null, running: false };
  const gid = entry.id;
  const mechanicTemplate = mechanicTemplateFor(entry);
  /* 換皮優先序：改造草稿 → 這個 entry 自己的圖（remix 才有） */
  const getSprite = key => {
    return draftSpriteFor(gid, key) || spriteReady(entry.sprites[key]);
  };
  /* 便利函式：有換圖就置中等比畫出並回傳 true，沒有就回傳 false（讓遊戲畫預設外觀） */
  const drawSprite = (key, cx, cy, size, flip) => {
    const im = getSprite(key);
    if (!im) return false;
    const iw = mediaW(im), ih = mediaH(im);
    const s = Math.min(size / iw, size / ih), w = iw * s, h = ih * s;
    ctx.save(); ctx.translate(cx, cy); if (flip) ctx.scale(-1, 1);
    ctx.drawImage(im, -w / 2, -h / 2, w, h); ctx.restore();
    return true;
  };

  /* 實況預覽（attract mode）：滑到這格時，遊戲自己在標題後面隨機試玩 */
  const pv = { game: null, on: false, timer: null, restartT: null, swipeIv: null };
  function fitCanvas() {
    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    const pixelWidth = Math.round(rect.width * renderDpr);
    const pixelHeight = Math.round(rect.height * renderDpr);
    if (canvas.width === pixelWidth && canvas.height === pixelHeight) return;
    canvas.width = pixelWidth;
    canvas.height = pixelHeight;
    ctx.setTransform(pixelWidth / W, 0, 0, pixelHeight / H, 0, 0);
  }
  const pvEnv = {
    W, H, ctx, beep: () => {}, setScore: () => {}, getSprite, sprite: drawSprite,
    over() {
      if (!pv.on) return;
      clearTimeout(pv.restartT);
      pv.restartT = setTimeout(() => { if (pv.on && !state.running) pv.game.start(); }, 900);
    }
  };
  function startPreview() {
    if (pv.on || state.running) return;
    fitCanvas();
    pv.on = true;
    if (!pv.game) pv.game = entry.base.create(pvEnv);
    pv.game.start();
    schedulePvInput();
  }
  function stopPreview() {
    pv.on = false;
    clearTimeout(pv.timer); clearTimeout(pv.restartT); clearInterval(pv.swipeIv);
    if (pv.game) pv.game.stop();
  }
  function schedulePvInput() {
    pv.timer = setTimeout(() => {
      if (!pv.on) return;
      pvDemoInput();
      schedulePvInput();
    }, 350 + Math.random() * 550);
  }
  function pvDemoInput() {
    const x = W * (0.15 + Math.random() * 0.7), y = H * (0.25 + Math.random() * 0.55);
    pv.game.input('down', x, y);
    if (Math.random() < 0.45) {
      /* 偶爾來一段「水平」滑動（上下滑保留給 feed，遊戲互動不用垂直手勢） */
      let step = 0;
      const dx = (Math.random() < 0.5 ? -1 : 1) * (80 + Math.random() * 160), dy = (Math.random() - 0.5) * 50;
      clearInterval(pv.swipeIv);
      pv.swipeIv = setInterval(() => {
        if (!pv.on) return clearInterval(pv.swipeIv);
        step++;
        pv.game.input('move', x + dx * step / 6, y + dy * step / 6);
        if (step >= 6) { clearInterval(pv.swipeIv); pv.game.input('up', x + dx, y + dy); }
      }, 30);
    } else {
      setTimeout(() => { if (pv.on) pv.game.input('up', x, y); }, 90);
    }
  }

  const env = {
    W, H, ctx, beep, getSprite, sprite: drawSprite,
    setScore(n) { scEl.textContent = n; },
    over(score) {
      state.running = false;
      stage.classList.remove('playing');
      const snap = canvas.toDataURL('image/png');   /* 先抓結算畫面，等下實況會蓋掉 */
      const prev = bests[gid] || 0;
      const isBest = score > prev;
      if (isBest) { bests[gid] = score; submitScore(gid, score); }
      bestChip.style.display = ''; bsEl.textContent = bests[gid] || 0;
      overlay.innerHTML = `
        <div class="overlay-main">
          <div class="final">${score}</div>
          ${isBest && score > 0 ? '<div class="newbest">&#9733; 新紀錄</div>' : ''}
          <div class="ov-btns">
            <button class="share-score">分享成績</button>
            <button class="go">再玩一次</button>
            <button class="mechanic-create">二創</button>
          </div>
        </div>`;
      overlay.classList.remove('hidden');
      wireStart(overlay);
      let cardURL = null;
      buildShareCard(snap, entry.title, score, u => cardURL = u);
      overlay.querySelector('.share-score').addEventListener('click', () => {
        if (cardURL) shareScoreCard(cardURL, entry, score);
        else toast('成績圖產生中，再按一次');
      });
      startPreview();   /* 結算畫面後面繼續跑實況 */
    }
  };

  function begin() {
    stopPreview();
    fitCanvas();
    ensureAudio();
    if (!state.game) state.game = entry.base.create(env);
    scEl.textContent = '0';
    overlay.classList.add('hidden');
    stage.classList.add('playing');
    state.running = true;
    state.game.start();
  }
  function wireStart(root) {
    const go = root.querySelector('.go');
    if (go) go.addEventListener('click', e => { e.stopPropagation(); begin(); });
    const author = root.querySelector('.author-link');
    if (author) author.addEventListener('click', e => {
      e.stopPropagation();
      stopPreview();
      if (state.game && state.running) state.game.stop();
      state.running = false;
      stage.classList.remove('playing');
      openAuthorProfile(entry.authorId, entry.authorName || entry.author);
    });
    const mechanic = root.querySelector('.mechanic-create');
    if (mechanic) mechanic.addEventListener('click', e => {
      e.stopPropagation();
      stopPreview();
      if (state.game && state.running) state.game.stop();
      state.running = false;
      stage.classList.remove('playing');
      openRemix(entry);
    });
  }
  wireStart(overlay);

  function toLogical(e) {
    const r = canvas.getBoundingClientRect();
    return [(e.clientX - r.left) / r.width * W, (e.clientY - r.top) / r.height * H];
  }
  /* 首頁交給瀏覽器原生 scroll-snap；單一遊戲視圖才使用互動式拖曳。 */
  let gest = null;
  stage.addEventListener('pointerdown', e => {
    if (opts.standalone) {
      try { stage.setPointerCapture(e.pointerId); } catch (_) {}
    }
    gest = {
      id: e.pointerId, x0: e.clientX, y0: e.clientY, swiped: false,
      claimed: false, gaveDown: false, startedAt: e.timeStamp
    };
    if (e.target === canvas && state.running && state.game) {
      const [x, y] = toLogical(e);
      state.game.input('down', x, y);
      gest.gaveDown = true;
    }
  }, true);
  stage.addEventListener('pointermove', e => {
    if (!gest || e.pointerId !== gest.id) return;
    const dx = e.clientX - gest.x0;
    const dy = e.clientY - gest.y0;
    if (!gest.swiped && !gest.claimed) {
      if (Math.abs(dx) > 14 && Math.abs(dx) >= Math.abs(dy)) {
        gest.claimed = true;
      } else if (opts.standalone && Math.abs(dy) > 7 && Math.abs(dy) > Math.abs(dx) * 1.15) {
        gest.swiped = true;
        if (gest.gaveDown && state.game) {
          const [x, y] = toLogical(e);
          state.game.input('cancel', x, y);
        }
      }
    }
    if (gest.swiped) {
      e.preventDefault();
      opts.onStandaloneDrag?.('move', dy, e.timeStamp, gest.startedAt);
      return;
    }
    if (gest.gaveDown && state.running && state.game && (e.buttons || e.pointerType === 'touch')) {
      const [x, y] = toLogical(e);
      state.game.input('move', x, y);
    }
  }, true);
  function endGesture(e, cancelled) {
    if (!gest || e.pointerId !== gest.id) return;
    const finished = gest;
    const dy = e.clientY - finished.y0;
    if (!finished.swiped && finished.gaveDown && state.running && state.game) {
      const [x, y] = toLogical(e);
      state.game.input(cancelled ? 'cancel' : 'up', x, y);
    }
    gest = null;
    if (finished.swiped) {
      e.preventDefault();
      e.stopPropagation();
      opts.onStandaloneDrag?.(cancelled ? 'cancel' : 'end', dy, e.timeStamp, finished.startedAt);
    }
  }
  stage.addEventListener('pointerup', e => endGesture(e, false), true);
  stage.addEventListener('pointercancel', e => endGesture(e, true), true);

  const saveBtn = post.querySelector('.sv');
  likeBtn.addEventListener('click', () => toggleReaction(gid, 'like'));
  dislikeBtn.addEventListener('click', () => toggleReaction(gid, 'dislike'));
  saveBtn.addEventListener('click', () => toggleSave(gid));
  post.querySelector('.cmt').addEventListener('click', () => openComments(entry));
  post.querySelector('.shr').addEventListener('click', () => shareGame(entry));
  const rmxBtn = post.querySelector('.rmx');
  if (rmxBtn) rmxBtn.addEventListener('click', () => openRemix(entry));

  function refreshLike() {
    const st = likeState[gid];
    if (!st) return;
    likeBtn.classList.toggle('liked', st.mine);
    likeBtn.querySelector('.lc').textContent = st.count;
    dislikeBtn.classList.toggle('disliked', st.disliked);
    dislikeBtn.querySelector('.dc').textContent = st.dislikeCount;
  }
  function refreshSave() {
    saveBtn.classList.toggle('saved', !!saveState[gid]);
  }

  return {
    el: post, id: gid, entry, base: entry.base, remixOf: entry.remixOf, state, refreshLike, refreshSave,
    activate() {
      if (!state.running) startPreview();
    },
    deactivate() {
      stopPreview();
      stage.classList.remove('playing');
      if (state.game && state.running) { state.game.stop(); state.running = false; }
      if (!overlay.classList.contains('hidden')) return;
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<div class="overlay-main"><button class="author-link">${entry.author}</button>` +
        `<h2>${entry.title.split('：')[0]}</h2><div class="ov-btns initial-actions">` +
        `<button class="go">開始</button><button class="mechanic-create">二創</button></div></div>`;
      wireStart(overlay);
    }
  };
}

/* IntersectionObserver：滑到哪格就啟動哪格的實況預覽 */
const io = new IntersectionObserver(ents => {
  for (const en of ents) {
    const p = posts.find(p => p.el === en.target);
    if (!p) continue;
    if (en.isIntersecting && en.intersectionRatio >= 0.5) p.activate();
    else p.deactivate();
  }
}, { threshold: [0, 0.5, 1] });

  element.style.willChange = 'transform';
}
function discardStandaloneIncoming() {
  if (!standaloneIncomingPost) return;
  standaloneIncomingPost.deactivate();
  standaloneIncomingPost.el.remove();
  standaloneIncomingPost = null;
}
function prepareStandaloneDrag(direction, dy) {
  if (!standalonePost || standaloneTransitioning) return null;
  if (standaloneDrag?.direction === direction) return standaloneDrag;
  discardStandaloneIncoming();
  resetStandaloneElement(standalonePost.el);
  const nextIndex = standaloneIndex + direction;
  positionStandaloneElement(standalonePost.el);
  if (nextIndex < 0 || nextIndex >= standaloneSequence.length) {
    standaloneDrag = { direction, nextIndex: -1, incoming: null, dy };
    return standaloneDrag;
  }
  const next = mountStandaloneEntry(standaloneSequence[nextIndex]);
  if (!next) return null;
  standaloneIncomingPost = next;
  positionStandaloneElement(next.el);
  standaloneDrag = { direction, nextIndex, incoming: next, dy };
  return standaloneDrag;
}
function drawStandaloneDrag(dy) {
  const direction = dy < 0 ? 1 : -1;
  const drag = prepareStandaloneDrag(direction, dy);
  if (!drag) return;
  drag.dy = dy;
  const height = Math.max(1, remixViewStage.clientHeight);
  if (!drag.incoming) {
    standalonePost.el.style.transform = `translate3d(0,${dy * .28}px,0)`;
    return;
  }
  standalonePost.el.style.transform = `translate3d(0,${dy}px,0)`;
  drag.incoming.el.style.transform =
    `translate3d(0,${direction * height + dy}px,0)`;
}
function settleStandaloneDrag(commit) {
  const drag = standaloneDrag;
  if (!drag || standaloneTransitioning) return;
  standaloneTransitioning = true;
  const height = Math.max(1, remixViewStage.clientHeight);
  const currentY = drag.incoming ? drag.dy : drag.dy * .28;
  const targetCurrent = commit && drag.incoming ? -drag.direction * height : 0;
  const animations = [
    standalonePost.el.animate(
      [{ transform: `translate3d(0,${currentY}px,0)` },
       { transform: `translate3d(0,${targetCurrent}px,0)` }],
      { duration: commit ? 230 : 210, easing: 'cubic-bezier(.2,.72,.25,1)', fill: 'forwards' }
    )
  ];
  if (drag.incoming) {
    const incomingStart = drag.direction * height + drag.dy;
    const incomingEnd = commit ? 0 : drag.direction * height;
    animations.push(drag.incoming.el.animate(
      [{ transform: `translate3d(0,${incomingStart}px,0)` },
       { transform: `translate3d(0,${incomingEnd}px,0)` }],
      { duration: commit ? 230 : 210, easing: 'cubic-bezier(.2,.72,.25,1)', fill: 'forwards' }
    ));
  }
  Promise.allSettled(animations.map(animation => animation.finished)).then(() => {
    if (commit && drag.incoming && remixView.classList.contains('open')) {
      const previous = standalonePost;
      standaloneIndex = drag.nextIndex;
      standalonePost = drag.incoming;
      standaloneIncomingPost = null;
      previous.deactivate();
      previous.el.remove();
      resetStandaloneElement(standalonePost.el);
    } else {
      resetStandaloneElement(standalonePost?.el);
      discardStandaloneIncoming();
    }
    standaloneDrag = null;
    standaloneTransitioning = false;
  });
}
function handleStandaloneDrag(phase, dy, timeStamp, startedAt) {
  if (!remixView.classList.contains('open') || standaloneTransitioning) return;
  if (phase === 'move') {
    drawStandaloneDrag(dy);
    return;
  }
  if (!standaloneDrag) return;
  const elapsed = Math.max(1, timeStamp - startedAt);
  const velocity = dy / elapsed;
  const distance = Math.abs(dy);
  const threshold = Math.max(72, remixViewStage.clientHeight * .2);
  const commit = phase === 'end' && !!standaloneDrag.incoming &&
    (distance >= threshold || (distance >= 32 && Math.abs(velocity) >= .55));
  settleStandaloneDrag(commit);
}
function renderStandaloneEntry() {
  const entry = standaloneSequence[standaloneIndex];
  if (!entry) return;
  standalonePost?.deactivate();
  discardStandaloneIncoming();
  remixViewStage.innerHTML = '';
  standalonePost = mountStandaloneEntry(entry);
}
function navigateStandalone(direction) {
  if (standaloneTransitioning) return;
  const drag = prepareStandaloneDrag(direction, 0);
  if (!drag?.incoming) {
    if (standaloneSequence.length <= 1) returnFromStandalone();
    else settleStandaloneDrag(false);
    return;
  }
  settleStandaloneDrag(true);
}
function openStandalone(id, sequence = null, returnContext = null) {
  const entry = entryFor(id);
  if (!entry) { toast('找不到這個遊戲'); return; }
  closeProfile(); closeSearch(); closeRemix(); closeSheet();
  standaloneSequence = (sequence || [entry]).map(item =>
    typeof item === 'string' ? entryFor(item) : item
  ).filter(Boolean);
  standaloneIndex = Math.max(0, standaloneSequence.findIndex(item => item.id === entry.id));
  standaloneReturnContext = returnContext;
  remixView.classList.add('open');
  setNavVisible(false);
  renderStandaloneEntry();
}
function closeStandalone() {
  if (!remixView.classList.contains('open')) return;
  if (standalonePost) standalonePost.deactivate();
  if (standaloneIncomingPost) standaloneIncomingPost.deactivate();
  remixView.classList.remove('open');
  remixViewStage.innerHTML = '';
  standalonePost = null;
  standaloneIncomingPost = null;
  setNavVisible(true);
  standaloneSequence = [];
  standaloneTransitioning = false;
  standaloneDrag = null;
  standaloneReturnContext = null;
}
function returnFromStandalone() {
  const context = standaloneReturnContext;
  closeStandalone();
  if (context?.owner) {
    profileTab = context.tab || 'created';
    openProfile(context.owner);
    requestAnimationFrame(() => { document.getElementById('pgrid').scrollTop = context.scrollTop || 0; });
  }
}
document.getElementById('remixViewBack').addEventListener('click', returnFromStandalone);

/* 分享連結直達指定遊戲：base 遊戲在首頁 feed 裡找；remix 用單一遊戲視圖打開
   （remix 資料是非同步載入，找不到就重試等它進來） */
function goToHash(retries) {
  if (!location.hash) return;
  const id = decodeURIComponent(location.hash.slice(1));
  if (id.indexOf('remix:') === 0) {
    const entry = entryFor(id);
    if (entry) { openStandalone(id); return; }
    if (retries > 0) setTimeout(() => goToHash(retries - 1), 200);
    return;
  }
  const target = posts.find(p => p.id === id);
  if (target) {
    const jump = () => target.el.scrollIntoView();
    jump(); requestAnimationFrame(jump); setTimeout(jump, 250);   /* 打敗版面尚未穩定造成的回到頂端 */
  } else if (retries > 0) {
    setTimeout(() => goToHash(retries - 1), 200);
  }
}
goToHash(20);
window.addEventListener('hashchange', () => goToHash(20));

/* 桌機鍵盤 */
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  const p = posts.find(p => {
    const r = p.el.getBoundingClientRect();
    return r.top > -window.innerHeight/2 && r.top < window.innerHeight/2;
  });
  if (!p || !p.state.running || !p.state.game) return;
  if (e.key === 'ArrowLeft') { p.state.game.input('down', W*0.25, H/2); e.preventDefault(); }
  if (e.key === 'ArrowRight') { p.state.game.input('down', W*0.75, H/2); e.preventDefault(); }
  if (e.key === ' ' || e.key === 'ArrowUp') { p.state.game.input('down', W/2, H/2); e.preventDefault(); }
});

/* Toast */
let toastT = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2600);
}

loadLikes();
loadSaves();
loadRemixGames();

/* 投稿工具與沙盒遊戲使用的最小平台介面。 */

  get db() { return db; },

  registerOfficialOwner,
  finishBoot,
  refreshProfile() {
    if (profileBox.classList.contains('open')) {
      renderProfileGrid(profileTab);
      renderProfileSummary();
    }
  },
  toggleReaction,
  toggleSave,
  openComments,
  shareGame,
  shareResult,
  submitScore
};
